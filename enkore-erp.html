<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Enkore ERP</title>
  <meta name="theme-color" content="#0d0d0d">
  <link rel="icon" type="image/png" href="https://enkorebd.com/wp-content/uploads/2026/03/cropped-WhatsApp_Image_2026-01-24_at_1.50.39_PM__1_-removebg-preview-270x270.png">
  <link rel="shortcut icon" href="https://enkorebd.com/wp-content/uploads/2026/03/cropped-WhatsApp_Image_2026-01-24_at_1.50.39_PM__1_-removebg-preview-270x270.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --blue:      #29ABE2;
      --blue-d:    #1a8bbf;
      --black:     #0d0d0d;
      --dark1:     #161616;
      --dark2:     #1a1a1a;
      --dark3:     #222222;
      --sidebar-w: 220px;
    }
    html,body { height:100%; overflow:hidden; font-family:'Inter','Segoe UI',sans-serif; background:#f4f6f8; }

    /* ═══ LOGIN ═══ */
    #login-screen {
      position:fixed; inset:0; z-index:1000;
      background:var(--black);
      display:flex; align-items:center; justify-content:center; padding:24px;
    }
    .login-wrap { width:100%; max-width:380px; }
    .login-logo-area { text-align:center; margin-bottom:32px; }
    .login-logo-area img { height:38px; }
    .login-tagline { font-size:10px; color:rgba(255,255,255,.45); margin-top:10px; letter-spacing:1.5px; text-transform:uppercase; }
    .login-card {
      background:var(--dark1); border:1px solid var(--dark3);
      border-radius:16px; padding:28px 24px 24px;
    }
    .login-card h2 { font-size:18px; font-weight:600; color:#fff; }
    .login-sub { font-size:12px; color:#555; margin-top:4px; margin-bottom:24px; }
    .fg { margin-bottom:14px; }
    .fg label { display:block; font-size:10px; font-weight:700; color:#555; margin-bottom:7px; text-transform:uppercase; letter-spacing:0.7px; }
    .fg input {
      width:100%; padding:14px;
      background:#1e1e1e; border:1px solid var(--dark3);
      border-radius:10px; font-size:16px; color:#fff;
      font-family:inherit; outline:none; -webkit-appearance:none;
      transition:border-color 0.2s;
    }
    .fg input::placeholder { color:#333; }
    .fg input:focus { border-color:var(--blue); }
    .btn-login {
      width:100%; padding:15px;
      background:var(--blue); border:none; border-radius:10px;
      font-size:15px; font-weight:600; color:#fff;
      font-family:inherit; cursor:pointer; margin-top:6px;
      -webkit-appearance:none; transition:background 0.2s;
    }
    .btn-login:active { background:var(--blue-d); }
    .btn-login:disabled { opacity:0.6; cursor:not-allowed; }
    .login-err { color:#f87171; font-size:12px; text-align:center; margin-top:12px; min-height:16px; }
    .login-status { color:#888; font-size:12px; text-align:center; margin-top:12px; min-height:16px; }
    .remember-row { display:flex; align-items:center; gap:8px; margin-top:4px; margin-bottom:4px; }
    .remember-row input[type=checkbox] { width:16px; height:16px; accent-color:var(--blue); cursor:pointer; flex-shrink:0; }
    .remember-row label { font-size:12px; color:#777; cursor:pointer; user-select:none; }
    .login-footer { text-align:center; margin-top:22px; font-size:10px; color:rgba(255,255,255,.3); }

    /* ═══ SHELL ═══ */
    #shell { display:none; height:100%; }

    /* TOP BAR */
    .topbar {
      position:fixed; top:0; left:0; right:0; height:52px;
      background:#fff; border-bottom:1px solid #eee;
      display:flex; align-items:center; padding:0 14px 0 16px; gap:10px; z-index:100;
    }
    .tb-logo img { height:24px; border-radius:6px; }
    .tb-spacer { flex:1; }
    .tb-panel { font-size:13px; color:#999; font-weight:500; display:none; }
    .tb-uinfo .tbun { font-size:12px; font-weight:600; color:#111; }
    .tb-uinfo .tbur { font-size:10px; color:#888; }
    .tb-uinfo .tbuid { font-size:9px; color:#aaa; letter-spacing:0.3px; }
    .tb-avatar {
      width:34px; height:34px; border-radius:50%;
      background:var(--blue); color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:700; cursor:pointer; flex-shrink:0;
    }
    .btn-logout-desk {
      display:none; padding:7px 14px;
      background:#f5f5f5; border:1px solid #e8e8e8; border-radius:7px;
      font-size:12px; color:#555; font-family:inherit;
      cursor:pointer; font-weight:500; white-space:nowrap;
    }
    .btn-logout-desk:hover { background:#fef2f2; border-color:#fca5a5; color:#ef4444; }

    /* USER MENU */
    .user-menu {
      position:fixed; top:56px; right:12px;
      background:#fff; border:1px solid #e8e8e8; border-radius:12px; padding:6px 0;
      min-width:190px; box-shadow:0 8px 28px rgba(0,0,0,0.12);
      z-index:300; display:none;
    }
    .user-menu.open { display:block; }
    .um-info { padding:10px 16px; border-bottom:1px solid #f0f0f0; margin-bottom:4px; }
    .um-info .um-n { font-size:13px; font-weight:600; color:#111; }
    .um-info .um-r { font-size:11px; color:#888; margin-top:2px; }
    .um-item { padding:11px 16px; font-size:13px; color:#444; cursor:pointer; display:flex; align-items:center; gap:9px; }
    .um-item:hover { background:#fafafa; }
    .um-item.danger { color:#ef4444; }

    /* CONTENT */
    .content {
      position:fixed; top:52px; left:0; right:0;
      bottom:calc(58px + env(safe-area-inset-bottom,0px));
      background:#f4f6f8;
    }
    .content iframe { width:100%; height:100%; border:none; display:block; }

    /* BOTTOM NAV */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0;
      height:calc(58px + env(safe-area-inset-bottom,0px));
      padding-bottom:env(safe-area-inset-bottom,0px);
      background:#fff; border-top:1px solid #eee;
      display:flex; align-items:center;
      overflow-x:auto; -webkit-overflow-scrolling:touch;
      z-index:100; scrollbar-width:none; padding-left:8px; padding-right:8px; gap:6px;
    }
    .bottom-nav::-webkit-scrollbar { display:none; }
    .bnav-item {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-width:52px; padding:0 4px; gap:3px;
      cursor:pointer; flex-shrink:0; user-select:none;
    }
    .bnav-icon {
      width:36px; height:36px; border-radius:50%;
      background:#f4f6f8; display:flex; align-items:center; justify-content:center;
      font-size:16px; line-height:1; transition:background 0.15s;
    }
    .bnav-item.active .bnav-icon { background:#f4f6f8; outline:2px solid var(--blue); outline-offset:-2px; }
    .bnav-label { font-size:8px; font-weight:500; color:#999; white-space:nowrap; }
    .bnav-item.active .bnav-label { color:var(--blue); font-weight:600; }

    /* SIDEBAR */
    .sidebar {
      display:none; position:fixed; top:0; left:0; bottom:0;
      width:var(--sidebar-w); background:var(--black);
      flex-direction:column; overflow-y:auto; border-right:1px solid var(--dark2); z-index:200;
    }
    .sidebar::-webkit-scrollbar { width:3px; }
    .sidebar::-webkit-scrollbar-thumb { background:var(--dark2); }
    .sb-logo { padding:18px 16px 16px; border-bottom:1px solid var(--dark2); }
    .sb-logo img { height:28px; }
    .nav-sect { padding:18px 0 4px; }
    .nav-lbl { padding:0 16px 8px; font-size:10px; font-weight:700; color:#2a2a2a; text-transform:uppercase; letter-spacing:1.5px; }
    .nav-item {
      display:flex; align-items:center; gap:10px;
      padding:10px 16px; cursor:pointer;
      color:#4a4a4a; font-size:13px; font-weight:500;
      border-left:2px solid transparent; transition:all 0.15s; user-select:none;
    }
    .nav-item:hover { background:var(--dark2); color:#ccc; }
    .nav-item.active { background:#1f1f1f; color:#fff; border-left-color:var(--blue); }
    .nav-icon { font-size:14px; width:18px; text-align:center; flex-shrink:0; }
    .ro-badge { margin-left:auto; font-size:8px; padding:2px 5px; background:#1a2a35; color:var(--blue); border-radius:4px; font-weight:600; }
    .sb-footer { margin-top:auto; padding:14px 16px; border-top:1px solid var(--dark2); font-size:10px; color:#282828; }

    /* DESKTOP ≥769px */
    @media (min-width:769px) {
      .sidebar    { display:flex; }
      .bottom-nav { display:none; }
      .topbar     { left:var(--sidebar-w); height:56px; }
      .tb-logo    { display:none; }
      .tb-panel   { display:block; }
      .btn-logout-desk { display:block; }
      .content    { top:56px; left:var(--sidebar-w); bottom:0; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo-area">
      <img src="assets/logo-white.png" alt="Enkore" />
      <div class="login-tagline">Enterprise Resource Planning</div>
    </div>
    <div class="login-card">
      <h2>Welcome back</h2>
      <div class="login-sub">Sign in with your Employee ID</div>
      <div class="fg">
        <label>Employee ID</label>
        <input type="text" id="inp-id" placeholder="e.g. 1011100001" autocomplete="username" inputmode="numeric" />
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="inp-pass" placeholder="Enter your password" autocomplete="current-password" />
      </div>
      <div class="remember-row">
        <input type="checkbox" id="chk-remember" />
        <label for="chk-remember">Remember me on this device</label>
      </div>
      <button class="btn-login" id="btn-login" onclick="doLogin()">Sign In</button>
      <div class="login-status" id="login-status"></div>
      <div class="login-err" id="login-err"></div>
    </div>
    <div class="login-footer">© <span id="copy-year"></span> Enkore Automotive Ltd.<br>Internal Use Only</div>
  </div>
</div>

<!-- SHELL -->
<div id="shell">
  <div class="topbar">
    <div class="tb-logo"><img src="assets/invoice-logo.png" alt="Enkore" /></div>
    <div class="tb-panel" id="tb-panel"></div>
    <div class="tb-spacer"></div>
    <div class="tb-uinfo"><div class="tbun" id="tb-name">-</div><div class="tbur" id="tb-role">-</div><div class="tbuid" id="tb-uid">-</div></div>
    <div class="tb-avatar" id="tb-avatar" onclick="toggleMenu()">--</div>
    <button class="btn-logout-desk" onclick="doLogout()">Logout</button>
  </div>

  <div class="user-menu" id="user-menu">
    <div class="um-info"><div class="um-n" id="um-n">-</div><div class="um-r" id="um-r">-</div></div>
    <div class="um-item danger" onclick="doLogout()"><span>🚪</span> Sign Out</div>
  </div>

  <nav class="sidebar" id="sidebar">
    <div class="sb-logo"><img src="assets/logo-white.png" alt="Enkore" /></div>
    <div class="nav-sect">
      <div class="nav-lbl">Panels</div>
      <div id="sidebar-panels"></div>
    </div>
    <div class="sb-footer">Enkore ERP v1.0</div>
  </nav>

  <div class="content">
    <iframe id="panel-frame" src="" title="Panel" allowfullscreen></iframe>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<!-- UPDATE BANNER -->
<div id="update-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#1971c2;color:#fff;padding:12px 16px;align-items:center;justify-content:space-between;gap:12px;font-family:inherit;box-shadow:0 -2px 12px rgba(0,0,0,.2);">
  <span style="font-size:13px;font-weight:600;">🔄 New update available</span>
  <button onclick="applyUpdate()" style="background:#fff;color:#1971c2;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;">Tap to Update</button>
</div>

<script>
  // ── CONFIG ──
  const SHEET_ID   = '1mXI0MI9R_5_ImxiTvw8vH0EaQ38M3WlHncjZgmPLTmc';
  const ACCESS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=Access`;
  const LINK_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=Panels`;

  let currentUser = null, menuOpen = false;

  // ── CSV PARSER (handles quoted fields with commas inside) ──
  function parseCSVLine(line) {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n').filter(l => l.trim());
    if (lines.length < 2) return [];
    const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase().replace(/"/g,''));
    return lines.slice(1).map(line => {
      const vals = parseCSVLine(line);
      const obj = {};
      headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/^"|"$/g,''));
      return obj;
    });
  }

  // ── PARSE USER PANELS ──
  function parsePanels(panelsStr, allPanels) {
    const str = (panelsStr || '').trim();
    if (!str) return [];

    // "All" — full access to every panel
    if (str.toLowerCase() === 'all') {
      return allPanels.map(p => ({ ...p, readonly: false }));
    }

    // "All (Readonly)" — every panel in view-only mode
    if (/^all\s*\(readonly\)$/i.test(str)) {
      return allPanels.map(p => ({ ...p, readonly: true }));
    }

    // Comma-separated list, each item optionally suffixed with "(Readonly)"
    // e.g. "Admin Dashboard, Sales Entry (Readonly), Drive"
    return str.split(',').map(item => {
      item = item.trim();
      const readonly = /\(readonly\)/i.test(item);
      const name = item.replace(/\s*\(readonly\)/i, '').trim();
      const panel = allPanels.find(p => p.name.toLowerCase() === name.toLowerCase());
      if (!panel) return null;
      return { ...panel, readonly };
    }).filter(Boolean);
  }

  // ── SHEET FETCHER ──
  async function fetchSheetData(sheetId, sheetName) {
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(sheetName)}&t=${Date.now()}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const match = text.match(/setResponse\(([\s\S]*)\)\s*;?\s*$/);
    if (!match) throw new Error('Parse error');
    const data = JSON.parse(match[1]);
    if (!data || !data.table) throw new Error('No table data');
    const cols = data.table.cols.map(c => (c.label || c.id || '').toLowerCase().trim());
    return (data.table.rows || []).map(r => {
      const obj = {};
      (r.c || []).forEach((cell, i) => {
        obj[cols[i]] = (cell && cell.v !== null && cell.v !== undefined) ? String(cell.v).trim() : '';
      });
      return obj;
    });
  }

  // ── 24-HOUR CACHE ──
  const CACHE_KEY = 'enkore_erp_cache';
  const CACHE_TTL = 6 * 60 * 60 * 1000;

  async function getSheetData(forceRefresh) {
    if (!forceRefresh) {
      try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
          const { data, ts } = JSON.parse(cached);
          if (Date.now() - ts < CACHE_TTL) return data;
        }
      } catch(e) {}
    }
    const [accessData, linkData] = await Promise.all([
      fetchSheetData(SHEET_ID, 'Access'),
      fetchSheetData(SHEET_ID, 'Panels')
    ]);
    const data = { accessData, linkData };
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ data, ts: Date.now() })); } catch(e) {}
    return data;
  }

  function refreshCache() {
    toggleMenu();
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('shell').style.display = 'none';
    currentUser = null;
    sessionStorage.removeItem('erp_user');
    localStorage.removeItem(CACHE_KEY);
    document.getElementById('login-status').textContent = 'Data cleared. Please sign in again.';
  }

  // ── LOGIN ──
  async function doLogin() {
    const uid  = document.getElementById('inp-id').value.trim();
    const pass = document.getElementById('inp-pass').value;
    const err  = document.getElementById('login-err');
    const stat = document.getElementById('login-status');
    const btn  = document.getElementById('btn-login');

    err.textContent  = '';
    stat.textContent = '';

    if (!uid || !pass) { err.textContent = 'Please fill in both fields.'; return; }

    btn.disabled    = true;
    btn.textContent = 'Signing in...';

    try {
      const hasCached = (() => { try { const c = localStorage.getItem(CACHE_KEY); if (!c) return false; const { ts } = JSON.parse(c); return Date.now() - ts < CACHE_TTL; } catch(e) { return false; } })();
      if (!hasCached) stat.textContent = 'Loading permissions (first time only)...';

      const { accessData, linkData } = await getSheetData();

      const userRow = accessData.find(u => u.id === uid && u.pass === pass);
      if (!userRow) {
        err.textContent = 'Invalid Employee ID or Password.';
        document.getElementById('inp-pass').value = '';
        return;
      }

      if (document.getElementById('chk-remember').checked) {
        localStorage.setItem('enkore_erp_remember', JSON.stringify({ id: uid, pass }));
      } else {
        localStorage.removeItem('enkore_erp_remember');
      }

      const allPanels = linkData
        .map(row => ({ name: row.name, file: row.file, icon: row.icon || '📋' }))
        .filter(p => p.name && p.file);

      const userPanels = parsePanels(userRow.panels, allPanels);
      if (userPanels.length === 0) {
        err.textContent = 'No panels assigned. Contact admin.';
        return;
      }

      currentUser = { id: userRow.id, name: userRow.name, role: userRow.role || '', panels: userPanels };
      sessionStorage.setItem('erp_user', JSON.stringify(currentUser));
      // New token per login — panels (e.g. dashboard) use it to auto-refresh once on fresh login.
      sessionStorage.setItem('erp_login_token', String(Date.now()));
      stat.textContent = '';
      showShell(currentUser);

    } catch(e) {
      err.textContent = 'Could not connect. Check your internet connection.';
      console.error(e);
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  }

  // ── REMEMBER ME PRE-FILL ──
  window.addEventListener('DOMContentLoaded', () => {
    try {
      const saved = localStorage.getItem('enkore_erp_remember');
      if (saved) {
        const { id, pass } = JSON.parse(saved);
        document.getElementById('inp-id').value   = id   || '';
        document.getElementById('inp-pass').value = pass || '';
        document.getElementById('chk-remember').checked = true;
      }
    } catch(e) {}
  });

  // ── KEYBOARD: Tab-free login flow ──
  // Enter on Employee ID → focus Password  |  Enter on Password (or anywhere else on login screen) → Sign In
  document.getElementById('inp-id').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('inp-pass').focus(); }
  });
  document.getElementById('inp-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); doLogin(); }
  });

  // Set copyright year dynamically
  document.getElementById('copy-year').textContent = new Date().getFullYear();

  // ── SHOW SHELL ──
  function showShell(user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('shell').style.display = 'block';

    const ini = user.name.split(' ').map(n => n[0]).slice(0,2).join('').toUpperCase();
    document.getElementById('tb-avatar').textContent = ini;
    document.getElementById('tb-name').textContent   = user.name;
    document.getElementById('tb-role').textContent   = user.role;
    document.getElementById('tb-uid').textContent    = user.id;
    document.getElementById('um-n').textContent      = user.name;
    document.getElementById('um-r').textContent      = user.role;

    buildNav(user.panels);
    initHome();
  }

  // ── BUILD NAV — all panels from sheet, no whitelist ──
  function buildNav(panels) {
    const sbPanels = document.getElementById('sidebar-panels');
    const btmNav   = document.getElementById('bottom-nav');
    sbPanels.innerHTML = '';
    btmNav.innerHTML   = '';

    panels.forEach(panel => {
      const si = document.createElement('div');
      si.className = 'nav-item';
      si.id = 'snav-' + panel.file;
      si.innerHTML = `<span class="nav-icon">${panel.icon}</span>${panel.name}` +
        (panel.readonly ? `<span class="ro-badge">View</span>` : '');
      si.onclick = () => loadPanel(panel.file, panel.name, panel.readonly);
      sbPanels.appendChild(si);

      const bi = document.createElement('div');
      bi.className = 'bnav-item';
      bi.id = 'bnav-' + panel.file;
      bi.innerHTML = `<span class="bnav-icon">${panel.icon}</span><span class="bnav-label">${panel.name}</span>`;
      bi.onclick = () => loadPanel(panel.file, panel.name, panel.readonly);
      btmNav.appendChild(bi);
    });
  }

  // ── PANEL NAVIGATION ──
  // Back-button model (Android-style):
  //   • Back from ANY panel        → jump straight to the main (leftmost) panel.
  //   • Back from the MAIN panel    → leave / minimize the app.
  // The main panel is the base history entry; we never stack more than one extra
  // entry above it, so one Back always lands on the main panel.
  let atHome = true;
  function homePanel() { return currentUser && currentUser.panels[0]; }

  // Paints a panel into the shell (nav highlight + iframe). No history changes.
  function applyPanel(file, name, readonly) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.bnav-item').forEach(el => el.classList.remove('active'));
    const sn = document.getElementById('snav-' + file);
    if (sn) sn.classList.add('active');
    const bn = document.getElementById('bnav-' + file);
    if (bn) bn.classList.add('active');

    document.getElementById('tb-panel').textContent = name;

    const p = new URLSearchParams({
      userId:   currentUser.id,
      name:     currentUser.name,
      role:     currentUser.role,
      readonly: readonly ? '1' : '0'
    });
    const frame = document.getElementById('panel-frame');
    frame._readonly = !!readonly;
    const url = 'panels/' + file + '.html?' + p.toString();
    // location.replace keeps the iframe's own history from stacking.
    if (frame.contentWindow) { try { frame.contentWindow.location.replace(url); } catch(_) { frame.src = url; } }
    else frame.src = url;
    closeMenu();
  }

  // User taps a panel (sidebar or footer).
  function loadPanel(file, name, readonly) {
    const home = homePanel();
    if (!home) return;

    if (file === home.file) {
      // Going to the main panel: if we're deeper, pop back to the base entry.
      if (!atHome) { history.back(); return; } // popstate paints home
      applyPanel(file, name, readonly);
      return;
    }

    // Going to a non-home panel: keep exactly ONE entry above home.
    const state = { panel: file, name: name, readonly: !!readonly };
    if (atHome) history.pushState(state, '', '#' + file);
    else        history.replaceState(state, '', '#' + file);
    atHome = false;
    applyPanel(file, name, readonly);
  }

  // Establishes the main panel as the base history entry (called after login).
  function initHome() {
    const home = homePanel();
    if (!home) return;
    history.replaceState({ panel: home.file, name: home.name, readonly: !!home.readonly }, '', '#' + home.file);
    atHome = true;
    applyPanel(home.file, home.name, home.readonly);
  }

  // ── BACK / FORWARD ──
  window.addEventListener('popstate', function(e) {
    if (!currentUser) return;
    const home = homePanel();
    const st = e.state;
    if (st && st.panel && home && st.panel !== home.file) {
      atHome = false;                                   // forward onto the non-home entry
      applyPanel(st.panel, st.name, st.readonly);
    } else {
      atHome = true;                                    // popped down to the main panel
      if (home) applyPanel(home.file, home.name, home.readonly);
    }
  });

  // ── UNIVERSAL READONLY ENFORCEMENT ──
  // Runs on every panel load. If readonly=true, injects a CSS+JS lock
  // into the iframe so no panel needs its own readonly logic — ever.
  (function() {
    const frame = document.getElementById('panel-frame');
    frame.addEventListener('load', function() {
      if (!frame._readonly) return;
      try {
        const doc = frame.contentDocument;
        if (!doc || !doc.body) return;

        // 1. Disable all interactive elements via CSS
        const style = doc.createElement('style');
        style.id = '__ro_style';
        style.textContent = `
          input, textarea, select,
          [contenteditable="true"] { pointer-events:none !important; cursor:not-allowed !important; }
          button, [type="submit"], [type="button"],
          [type="reset"] { pointer-events:none !important; opacity:.5 !important; cursor:not-allowed !important; }
          a { pointer-events:none !important; cursor:default !important; }
          form { pointer-events:none !important; }
        `;
        doc.head.appendChild(style);

        // 2. Hard-block all form submissions and clicks (belt + suspenders)
        doc.addEventListener('submit',  e => { e.preventDefault(); e.stopImmediatePropagation(); }, true);
        doc.addEventListener('click',   e => {
          if (e.target.closest('button, input, textarea, select, a, [type="submit"]')) {
            e.preventDefault(); e.stopImmediatePropagation();
          }
        }, true);
        doc.addEventListener('keydown', e => {
          if (e.target.matches('input, textarea, select, [contenteditable]')) {
            e.preventDefault(); e.stopImmediatePropagation();
          }
        }, true);

        // 3. Block all network writes — override fetch and XHR in the iframe.
        // This is the hard stop: even if a click somehow slips through the UI
        // layer, the actual HTTP request to Apps Script is cancelled here.
        const win = frame.contentWindow;
        const _origFetch = win.fetch.bind(win);
        win.fetch = function(...args) {
          const url = String(typeof args[0] === 'string' ? args[0] : (args[0] && args[0].url) || '');
          // Block any write to Google Apps Script endpoints
          if (/script\.google\.com|AKfyc[A-Za-z0-9_-]+/i.test(url)) {
            showToast('👁 View only — submit is disabled', 'err');
            return Promise.resolve(new Response(JSON.stringify({ success: false, error: 'View-only mode' }), {
              status: 200, headers: { 'Content-Type': 'application/json' }
            }));
          }
          return _origFetch.apply(win, args);
        };
        const _origXHROpen = win.XMLHttpRequest.prototype.open;
        win.XMLHttpRequest.prototype.open = function(method, url, ...rest) {
          if (/script\.google\.com|AKfyc[A-Za-z0-9_-]+/i.test(String(url))) {
            this._blocked = true;
          }
          return _origXHROpen.apply(this, [method, url, ...rest]);
        };
        const _origXHRSend = win.XMLHttpRequest.prototype.send;
        win.XMLHttpRequest.prototype.send = function(...args) {
          if (this._blocked) {
            showToast('👁 View only — submit is disabled', 'err');
            // Fire a synthetic error so callers don't hang
            setTimeout(() => {
              Object.defineProperty(this, 'status', { value: 200, writable: true });
              Object.defineProperty(this, 'responseText', { value: JSON.stringify({ success: false, error: 'View-only mode' }), writable: true });
              this.dispatchEvent(new Event('load'));
            }, 0);
            return;
          }
          return _origXHRSend.apply(this, args);
        };

        function showToast(msg, type) {
          const t = doc.getElementById('toast');
          if (!t) return;
          t.textContent = msg;
          t.className = 'toast ' + (type || '') + ' show';
          setTimeout(() => { t.className = 'toast'; }, 3000);
        }

        // 3. View-only banner
        const banner = doc.createElement('div');
        banner.id = '__ro_banner';
        banner.style.cssText = [
          'position:fixed','top:0','left:0','right:0','z-index:999999',
          'background:#f59e0b','color:#1a1a1a','font-family:Inter,sans-serif',
          'font-size:11px','font-weight:700','letter-spacing:.4px',
          'text-align:center','padding:6px 12px',
          'box-shadow:0 2px 6px rgba(0,0,0,.18)'
        ].join(';');
        banner.textContent = '👁  VIEW ONLY — You do not have permission to edit or submit data.';
        doc.body.insertBefore(banner, doc.body.firstChild);

        // Push body down so banner doesn't overlap content
        const curr = parseInt(getComputedStyle(doc.body).paddingTop) || 0;
        doc.body.style.paddingTop = (curr + 34) + 'px';

      } catch(err) {
        console.warn('[ERP] Readonly injection error:', err);
      }
    });
  })();

  // ── USER MENU ──
  function toggleMenu() { menuOpen = !menuOpen; document.getElementById('user-menu').classList.toggle('open', menuOpen); }
  function closeMenu()  { menuOpen = false; document.getElementById('user-menu').classList.remove('open'); }
  document.addEventListener('click', e => {
    if (menuOpen && !document.getElementById('user-menu').contains(e.target) && !document.getElementById('tb-avatar').contains(e.target)) closeMenu();
  });

  // ── LOGOUT ──
  function doLogout() {
    currentUser = null;
    sessionStorage.removeItem('erp_user');
    sessionStorage.removeItem('enkore_sales_data');
    localStorage.removeItem(CACHE_KEY);
    document.getElementById('panel-frame').src = 'about:blank';
    document.getElementById('shell').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('inp-id').value  = '';
    document.getElementById('inp-pass').value = '';
    document.getElementById('login-err').textContent  = '';
    document.getElementById('login-status').textContent = '';
    closeMenu();
  }

  // ── SESSION RESTORE ──
  window.addEventListener('load', () => {
    const s = sessionStorage.getItem('erp_user');
    if (s) {
      try { currentUser = JSON.parse(s); showShell(currentUser); }
      catch(e) { sessionStorage.removeItem('erp_user'); }
    }
  });

  // ── SERVICE WORKER + AUTO UPDATE ──
  // Goal: users never reinstall. Every launch/refocus checks for a new version.
  // A fresh launch updates silently; mid-session shows a "Tap to Update" banner.
  let _updating = false;
  if ('serviceWorker' in navigator) {
    // Reload once, only when WE intentionally activate a new worker (ignores the
    // very first install's claim so it doesn't reload on first ever load).
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (_updating) window.location.reload();
    });

    window.addEventListener('load', () => {
      // updateViaCache:'none' → the browser never serves sw.js from HTTP cache,
      // so a new deploy is always detected.
      navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then(reg => {
        reg.update().catch(() => {});
        // Re-check whenever the installed app is reopened or brought to front.
        const recheck = () => { if (document.visibilityState === 'visible') reg.update().catch(() => {}); };
        document.addEventListener('visibilitychange', recheck);
        window.addEventListener('focus', recheck);

        if (reg.waiting && navigator.serviceWorker.controller) promptOrApply(reg);

        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          if (!newSW) return;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) promptOrApply(reg);
          });
        });
      }).catch(() => {});
    });
  }

  function promptOrApply(reg) {
    window._pendingReg = reg;
    // "Working" = already logged in and inside a panel → don't interrupt; show banner.
    if (currentUser) document.getElementById('update-banner').style.display = 'flex';
    else applyUpdate(); // fresh launch → update silently
  }

  function applyUpdate() {
    const reg = window._pendingReg;
    document.getElementById('update-banner').style.display = 'none';
    if (reg && reg.waiting) { _updating = true; reg.waiting.postMessage({ type: 'SKIP_WAITING' }); }
    else window.location.reload();
  }
</script>
