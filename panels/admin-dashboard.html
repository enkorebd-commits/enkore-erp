<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --blue:    #29ABE2;
      --blue-d:  #1583b3;
      --green:   #16b07c;
      --red:     #ef4444;
      --bg:      #f4f6fa;
      --card:    #ffffff;
      --text:    #16181d;
      --sub2:    #828791;
      --border:  #eceff3;
      --r:       16px;
      --sh:      0 1px 3px rgba(18,22,33,.06), 0 0 1px rgba(18,22,33,.08);
    }
    body {
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow-y:auto;
      min-height:100vh;
      padding-bottom:28px;
    }

    /* ── greeting ── */
    /* brand navy — deep shades of the Enkore blue (#29ABE2) */
    .greeting {
      background:linear-gradient(140deg,#0a1f30 0%,#0f3552 70%,#13507c 100%);
      padding:18px 18px 22px;
      color:#fff; position:relative; overflow:hidden;
    }
    .greeting::after {
      content:''; position:absolute; right:-40px; top:-50px;
      width:180px; height:180px; border-radius:50%;
      background:rgba(255,255,255,.05);
    }
    .g-date  { font-size:11px; color:rgba(255,255,255,.55); margin-bottom:4px; font-weight:600; letter-spacing:.3px; }
    .g-name  { font-size:20px; font-weight:800; line-height:1.2; letter-spacing:-.3px; }
    .g-quote { font-size:11px; color:rgba(255,255,255,.45); font-style:italic; margin-top:6px; line-height:1.5; max-width:300px; }

    .section { padding:14px 14px 0; }
    .sec-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .sec-title { font-size:10px; font-weight:800; letter-spacing:1.2px; color:var(--sub2); text-transform:uppercase; }

    /* ── amounts with tk unit ── */
    .amt { display:inline-flex; align-items:flex-end; gap:2px; }
    .amt .tk { font-size:.55em; font-weight:700; color:var(--sub2); padding-bottom:1px; }

    /* ── compact YTD stats ── */
    .ytd-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    @media(min-width:560px){ .ytd-grid { grid-template-columns:repeat(7,1fr); } }
    .ystat {
      background:var(--card); border-radius:12px; padding:9px 8px 8px;
      box-shadow:var(--sh); text-align:left;
    }
    .ystat-l { font-size:8.5px; color:var(--sub2); font-weight:700; text-transform:uppercase; letter-spacing:.3px; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ystat-v { font-size:13px; font-weight:800; line-height:1; white-space:nowrap; }
    .ystat-v.pos { color:var(--green); }
    .ystat-v.neg { color:var(--red); }
    .ystat-v.blu { color:var(--blue); }

    /* ── cash ── */
    .cash-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .ccard {
      background:var(--card); border-radius:12px; padding:10px 12px;
      box-shadow:var(--sh); display:flex; align-items:center; gap:10px;
    }
    .c-ava {
      width:30px; height:30px; border-radius:50%; flex-shrink:0;
      background:linear-gradient(135deg,#29ABE2,#1d6fa3); color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:800;
    }
    .ccard-name { font-size:10px; color:var(--sub2); font-weight:600; line-height:1.2; }
    .ccard-val  { font-size:15px; font-weight:800; color:var(--text); margin-top:1px; }

    /* ═══ SALES VS COLLECTION — distinct dark card ═══ */
    .sc-wrap {
      background:linear-gradient(140deg,#0a1f30 0%,#0f3552 70%,#13507c 100%);
      border-radius:18px; padding:14px 12px 12px;
      box-shadow:0 6px 20px rgba(10,31,48,.3);
      color:#fff;
    }
    .sc-title { font-size:10px; font-weight:800; letter-spacing:1.2px; color:rgba(255,255,255,.55); text-transform:uppercase; margin-bottom:10px; }
    .sc-wrap .amt .tk { color:rgba(255,255,255,.45); }

    .range-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .dwrap {
      position:relative; flex:1; min-width:0;
      background:linear-gradient(135deg,rgba(22,176,124,.85),rgba(16,140,98,.85));
      border:1px solid rgba(63,224,168,.45);
      border-radius:12px; padding:10px 6px;
      font-size:13px; font-weight:700; color:#fff; text-align:center;
      white-space:nowrap; overflow:hidden;
      box-shadow:0 2px 8px rgba(22,176,124,.25);
    }
    .dwrap:active { filter:brightness(1.08); }
    .dwrap input {
      position:absolute; inset:0; width:100%; height:100%;
      opacity:0; border:0; cursor:pointer; -webkit-appearance:none;
    }
    .dwrap input::-webkit-calendar-picker-indicator {
      position:absolute; inset:0; width:100%; height:100%;
      cursor:pointer; opacity:0;
    }
    .range-arrow { font-size:12px; color:rgba(255,255,255,.5); flex-shrink:0; font-weight:700; }

    .sc-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-bottom:10px; }
    .gtile {
      background:rgba(255,255,255,.17); border:1px solid rgba(255,255,255,.24);
      border-radius:12px; padding:9px 10px;
      box-shadow:0 4px 12px rgba(5,18,29,.35);
    }
    .gtile-l { font-size:9px; color:rgba(255,255,255,.7); font-weight:700; text-transform:uppercase; letter-spacing:.4px; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .gtile-v { font-size:14px; font-weight:800; line-height:1; white-space:nowrap; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.25); }
    .gtile-v.pos { color:#4ef0b6; }
    .gtile-v.neg { color:#ff9494; }
    .sc-wrap .amt .tk { color:rgba(255,255,255,.6); }

    .chart-panel {
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.07);
      border-radius:14px; padding:10px 8px 6px;
      position:relative; height:225px;
    }
    .chart-panel .state { padding:70px 20px; color:rgba(255,255,255,.55); }
    .chart-panel .spin { border-color:rgba(255,255,255,.2); border-top-color:#fff; }

    /* ── table ── */
    .tbl-card {
      background:var(--card); border-radius:var(--r);
      box-shadow:var(--sh); margin-bottom:16px; overflow:hidden;
    }
    .tbl-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .perf-tbl { width:100%; min-width:520px; border-collapse:collapse; font-size:12px; }
    .perf-tbl th {
      text-align:right; padding:11px 10px; font-size:9px; font-weight:800;
      text-transform:uppercase; letter-spacing:.6px; color:rgba(255,255,255,.85);
      white-space:nowrap; background:#0f3552; border-bottom:none;
    }
    .perf-tbl th:first-child, .perf-tbl td:first-child { text-align:left; padding-left:14px; }
    .perf-tbl td {
      padding:11px 10px; text-align:right; font-weight:600;
      border-bottom:1px solid #f3f5f8; white-space:nowrap;
    }
    .perf-tbl tr:last-child td { border-bottom:none; }
    .seller-cell { display:flex; align-items:center; gap:8px; }
    .s-ava {
      width:26px; height:26px; border-radius:50%; flex-shrink:0;
      background:#e7f5fd; color:var(--blue-d);
      display:flex; align-items:center; justify-content:center;
      font-size:10px; font-weight:800;
    }
    .s-name { font-weight:700; max-width:110px; overflow:hidden; text-overflow:ellipsis; }
    .perf-tbl .tot td { background:#e7f5fd; border-top:2px solid var(--blue); font-weight:800; }
    .rate-pill { display:inline-block; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:800; }
    .rate-hi  { background:#e4f8f0; color:var(--green); }
    .rate-mid { background:#e7f5fd; color:var(--blue-d); }
    .rate-lo  { background:#feecec; color:var(--red); }
    .pos-t { color:var(--green); }
    .neg-t { color:var(--red); }

    .state { text-align:center; padding:30px 20px; color:var(--sub2); font-size:13px; }
    .spin { width:22px; height:22px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div class="greeting">
  <div class="g-date"  id="g-date"></div>
  <div class="g-name"  id="g-name">Loading...</div>
  <div class="g-quote" id="g-quote"></div>
</div>

<!-- YTD + CASH (live) -->
<div id="dash-body">
  <div class="state"><div class="spin"></div>Loading dashboard...</div>
</div>

<!-- SALES VS COLLECTION -->
<div class="section">
  <div class="sc-wrap">
    <div class="sc-title">Sales vs Collection</div>
    <div class="range-row">
      <div class="dwrap" onclick="openPicker('d-start')"><span id="ds-show">—</span><input type="date" id="d-start" onchange="renderAnalytics()"></div>
      <span class="range-arrow">→</span>
      <div class="dwrap" onclick="openPicker('d-end')"><span id="de-show">—</span><input type="date" id="d-end" onchange="renderAnalytics()"></div>
    </div>
    <div class="sc-grid" id="sc-grid" style="display:none">
      <div class="gtile"><div class="gtile-l">Sales</div><div class="gtile-v" id="k-sales">—</div></div>
      <div class="gtile"><div class="gtile-l">Due</div><div class="gtile-v" id="k-due">—</div></div>
      <div class="gtile"><div class="gtile-l">Collection</div><div class="gtile-v" id="k-coll">—</div></div>
      <div class="gtile"><div class="gtile-l">Collection Rate</div><div class="gtile-v" id="k-crate">—</div></div>
      <div class="gtile"><div class="gtile-l">Gross Profit</div><div class="gtile-v" id="k-gp">—</div></div>
      <div class="gtile"><div class="gtile-l">Gross Profit %</div><div class="gtile-v" id="k-gpp">—</div></div>
      <div class="gtile"><div class="gtile-l">Expense</div><div class="gtile-v" id="k-exp">—</div></div>
      <div class="gtile"><div class="gtile-l">Net Profit</div><div class="gtile-v" id="k-np">—</div></div>
      <div class="gtile"><div class="gtile-l">Net Profit %</div><div class="gtile-v" id="k-npp">—</div></div>
    </div>
    <div class="chart-panel">
      <div class="state" id="an-state"><div class="spin"></div>Loading sales data...</div>
      <canvas id="trendChart" style="display:none"></canvas>
    </div>
  </div>
</div>

<div class="section" id="perf-section" style="display:none; padding-top:14px;">
  <div class="sec-hdr"><span class="sec-title">Salesman Performance</span></div>
  <div class="tbl-card"><div class="tbl-scroll">
    <table class="perf-tbl" id="perf-tbl"></table>
  </div></div>
</div>

<script>
  const FIN_SHEET_ID   = '1XE05NQJYc2QPM1qUivoGYUynu-lI1iaTH5Y785dPwJk';
  const SALES_SHEET_ID = '1IQ9osZGRHOYN_7UtioTOpkAF92wQ9TvNR31jZWop_Lg';

  const qp    = new URLSearchParams(window.location.search);
  const userId = qp.get('userId') || '';
  const userName = qp.get('name') || 'User';
  if (!userId) window.location.replace('../enkore-erp.html');

  const QUOTES = [
    "Revenue is vanity, profit is sanity, cash is reality.",
    "Small steps forward still move you ahead.",
    "Build something people love.",
    "Every great company started where you are now.",
    "Focus on the process — results will follow.",
    "Your team is your greatest asset.",
    "Done is better than perfect."
  ];

  // open native date picker (desktop + mobile)
  window.openPicker = function(id) {
    const el = document.getElementById(id);
    if (!el) return;
    try { el.showPicker(); } catch(e) { el.focus(); }
  };

  // ── format helpers ──
  const MMM = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtDate(d) { return d.getDate()+' '+MMM[d.getMonth()]+', '+d.getFullYear(); }   // 26 Jan, 2026

  function fmt(v) {
    if (v===''||v===null||v===undefined) return '—';
    const n = Number(v);
    if (isNaN(n)) return String(v);
    return (n<0?'−':'')+Math.abs(Math.round(n)).toLocaleString('en-IN');
  }
  function tk(v) {
    const s = fmt(v);
    if (s === '—') return s;
    return '<span class="amt">'+s+'<span class="tk">tk</span></span>';
  }
  function fmtPct(v) {
    if (v===''||v===null||v===undefined) return '—';
    const n = Number(v);
    if (isNaN(n)) return String(v);
    const pct = Math.abs(n) <= 1 ? n*100 : n;
    return pct.toFixed(0)+'%';
  }
  function numClass(v) {
    const n = Number(v);
    if (isNaN(n)||n===0) return '';
    return n>0?'pos':'neg';
  }

  (function() {
    const now  = new Date();
    const h    = now.getHours();
    const wrd  = h<12?'Good Morning':h<17?'Good Afternoon':h<21?'Good Evening':'Working Late';
    const wd   = now.toLocaleDateString('en-GB',{weekday:'long'});
    const first = userName.split(' ')[0];
    document.getElementById('g-date').textContent  = wd+' · '+fmtDate(now);
    document.getElementById('g-name').textContent  = wrd + ', ' + first + ' 👋';
    document.getElementById('g-quote').textContent = '" ' + QUOTES[now.getDay()] + ' "';
  })();

  // column map of Monthly Dashboard tab
  const C = { month:0, sales:2, paid:3, clrPct:4, due:5, gp:9, exp:20, np:22 };

  // ── compact YTD stats ──
  function ytdGrid(row) {
    const stats = [
      { lbl:'Sales',           val:tk(row[C.sales]),      cls:'blu' },
      { lbl:'Paid',            val:tk(row[C.paid]),       cls:'pos' },
      { lbl:'Collection Rate', val:fmtPct(row[C.clrPct]), cls: Number(row[C.clrPct])>=0.8?'pos':'blu' },
      { lbl:'Due',             val:tk(row[C.due]),        cls: Number(row[C.due])>0?'neg':'pos' },
      { lbl:'Gross Pft',       val:tk(row[C.gp]),         cls:numClass(row[C.gp]) },
      { lbl:'Expense',         val:tk(row[C.exp]),        cls:'' },
      { lbl:'Net Pft',         val:tk(row[C.np]),         cls:numClass(row[C.np]) },
    ];
    return '<div class="ytd-grid">'+
      stats.map(s=>
        '<div class="ystat">'+
        '<div class="ystat-l">'+s.lbl+'</div>'+
        '<div class="ystat-v '+s.cls+'">'+s.val+'</div>'+
        '</div>'
      ).join('')+
    '</div>';
  }

  function initials(name) {
    return String(name).split(' ').filter(Boolean).map(n=>n[0]).slice(0,2).join('').toUpperCase() || '?';
  }

  function buildDash(data) {
    const monthly = (data.monthly||[]).filter(r=>r[C.month]);
    window._mdata = monthly;

    let h = '';
    h += '<div class="section"><div class="sec-hdr"><span class="sec-title">Year to Date (YTD)</span></div>'+ytdGrid(data.ytd)+'</div>';
    h += '<div class="section"><div class="sec-hdr"><span class="sec-title">Cash in Hand</span></div><div class="cash-grid">'+
      '<div class="ccard"><div class="c-ava">MC</div><div><div class="ccard-name">Mahedi Islam Chayan</div><div class="ccard-val">'+tk(data.cash.chayan)+'</div></div></div>'+
      '<div class="ccard"><div class="c-ava">AR</div><div><div class="ccard-name">Anik Rahman</div><div class="ccard-val">'+tk(data.cash.anik)+'</div></div></div>'+
      '</div></div>';
    document.getElementById('dash-body').innerHTML = h;

    // refresh P&L tiles in Sales vs Collection now that finance data is here
    if (document.getElementById('d-start').value) renderAnalytics();
  }

  // ── finance data — read live from the Central Finance sheet via gviz ──
  window._financeLoaded = false;
  window._expLoaded = false;
  let EXP_ROWS = [];

  async function gvTable(sheetId, sheetName) {
    const url = 'https://docs.google.com/spreadsheets/d/'+sheetId+
                '/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(sheetName)+'&t='+Date.now();
    const txt = await fetch(url).then(r => r.text());
    const m = txt.match(/setResponse\(([\s\S]*)\)\s*;?\s*$/);
    if (!m) throw new Error('gviz parse');
    return JSON.parse(m[1]).table;
  }

  function rowVals(r) {
    const out = [];
    (r.c||[]).forEach((cell,i) => { out[i] = (cell && cell.v!==null && cell.v!==undefined) ? cell.v : ''; });
    return out;
  }

  const MONTH_RE = /^[A-Z][a-z]{2},?\s*\d{2}$/;

  async function loadFinance() {
    try {
      const [mt, ct, et] = await Promise.all([
        gvTable(FIN_SHEET_ID, 'Monthly Dashboard'),
        gvTable(FIN_SHEET_ID, 'Cash in Hand'),
        gvTable(FIN_SHEET_ID, 'Expense- Helper')
      ]);

      // expense register: D(3) Date · H(7) Expense amount
      EXP_ROWS = (et.rows||[]).map(r => {
        const c = r.c||[];
        const d = gvDate(c[3] ? (c[3].v!==null && c[3].v!==undefined ? c[3].v : null) : null);
        if (!d) return null;
        const amt = (c[7] && c[7].v!==null && c[7].v!==undefined && c[7].v!=='') ? (Number(c[7].v)||0) : 0;
        return { d: new Date(d.getFullYear(), d.getMonth(), d.getDate()), amt: amt };
      }).filter(Boolean);
      window._expLoaded = true;

      let ytd = null; const monthly = [];
      (mt.rows||[]).forEach(r => {
        const c = r.c||[];
        const v = rowVals(r);
        const label = (c[0] && (c[0].f || (c[0].v!==null && c[0].v!==undefined ? String(c[0].v) : '')) || '').trim();
        if (MONTH_RE.test(label)) { v[0] = label; monthly.push(v); }
        else if (!label && typeof v[2] === 'number' && !ytd) { ytd = v; }
      });
      if (!ytd) throw new Error('YTD row not found');

      let chayan = '', anik = '';
      (ct.rows||[]).forEach(r => {
        const c = r.c||[];
        const lbl = (c[0] && c[0].v!==null && c[0].v!==undefined) ? String(c[0].v).toLowerCase().trim() : '';
        if (lbl === 'positive') {
          chayan = (c[3] && c[3].v!==null && c[3].v!==undefined) ? c[3].v : '';
          anik   = (c[6] && c[6].v!==null && c[6].v!==undefined) ? c[6].v : '';
        }
      });

      window._financeLoaded = true;
      buildDash({ ok:true, ytd:ytd, monthly:monthly, cash:{ chayan:chayan, anik:anik } });
    } catch(e) {
      console.error(e);
      if (!window._financeLoaded) {
        document.getElementById('dash-body').innerHTML =
          '<div class="state">⚠️ Could not load finance data.<br><small>Central Finance sheet must be shared: Anyone with link · Viewer.</small></div>';
      }
    }
  }
  loadFinance();

  /* ═══════════════════════════════════════════════════════════
     SALES ANALYTICS — reads "Sale Entry" tab live via gviz
     select A,B,J,M,P → 0 Date · 1 Client · 2 Final Bill ·
                        3 Paid · 4 Seller
     ═══════════════════════════════════════════════════════════ */
  let AN_ROWS = [], trendChart = null;

  function isoLocal(d) {
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  function gvDate(v) {
    if (v===null || v===undefined || v==='') return null;
    const s = String(v);
    let m = s.match(/Date\((\d+),(\d+),(\d+)/);
    if (m) return new Date(+m[1], +m[2], +m[3]);
    m = s.match(/^(\d{1,2})\s+([A-Za-z]+),?\s+(\d{2,4})$/);          // "1 Jan, 26"
    if (m) {
      const y = m[3].length===2 ? 2000+ +m[3] : +m[3];
      const d = new Date(m[1]+' '+m[2]+' '+y);
      return isNaN(d) ? null : d;
    }
    m = s.match(/^([A-Za-z]{3,})\s+(\d{1,2}),?\s+(\d{2,4})$/);       // "Oct 19, 25"
    if (m) {
      const y = m[3].length===2 ? 2000+ +m[3] : +m[3];
      const d = new Date(m[2]+' '+m[1]+' '+y);
      return isNaN(d) ? null : d;
    }
    m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);                // "15/10/2025" DD/MM/YYYY
    if (m) {
      const y = m[3].length===2 ? 2000+ +m[3] : +m[3];
      const d = new Date(y, +m[2]-1, +m[1]);
      return isNaN(d) ? null : d;
    }
    const d = new Date(s);
    return isNaN(d) ? null : d;
  }

  function cellNum(c)  { return (c && c.v!==null && c.v!==undefined && c.v!=='') ? (Number(c.v)||0) : 0; }
  function cellStr(c)  { return (c && c.v!==null && c.v!==undefined) ? String(c.v).trim() : ''; }

  // Column indices (0-based) in Sale Entry sheet:
  // A=0 Date · B=1 Client · J=9 Final Bill · M=12 Paid · P=15 Seller · R=17 PMC
  const SC = { date:0, client:1, sales:9, paid:12, seller:15, pmc:17 };

  async function loadAnalytics() {
    try {
      const tbl  = await gvTable(SALES_SHEET_ID, 'Sale Entry');
      const rows = (tbl.rows||[]).map(r => {
        const c = r.c||[];
        const v = rowVals(r);
        const d = gvDate(c[SC.date] ? (c[SC.date].v!==null && c[SC.date].v!==undefined ? c[SC.date].v : null) : null);
        if (!d) return null;
        return {
          d:      new Date(d.getFullYear(), d.getMonth(), d.getDate()),
          client: v[SC.client]  ? String(v[SC.client]).trim()  : '',
          sales:  v[SC.sales]  !== '' ? (Number(v[SC.sales])||0)  : 0,
          paid:   v[SC.paid]   !== '' ? (Number(v[SC.paid])||0)   : 0,
          seller: (v[SC.seller] ? String(v[SC.seller]).trim() : '') || '(No seller)',
          pmc:    v[SC.pmc]    !== '' ? (Number(v[SC.pmc])||0)    : 0
        };
      }).filter(Boolean);
      AN_ROWS = rows;
      renderAnalytics();
    } catch(e) {
      document.getElementById('an-state').innerHTML = '⚠️ Could not load sales data.';
      console.error(e);
    }
  }

  function pctOf(part, base) {
    if (!base) return '—';
    return Math.round(part/base*100)+'%';
  }

  window.renderAnalytics = function() {
    const sEl = document.getElementById('d-start');
    const eEl = document.getElementById('d-end');
    if (!sEl.value || !eEl.value) return;
    let start = new Date(sEl.value+'T00:00:00');
    let end   = new Date(eEl.value+'T00:00:00');
    if (end < start) { const t = start; start = end; end = t; }

    // formatted date pills — 26 Jan, 2026
    document.getElementById('ds-show').textContent = fmtDate(start);
    document.getElementById('de-show').textContent = fmtDate(end);

    const rows = AN_ROWS.filter(r => r.d >= start && r.d <= end);

    // daily buckets
    const dayMs = 86400000;
    const nDays = Math.round((end - start)/dayMs) + 1;
    const labels = [], fullDates = [], salesArr = [], paidArr = [];
    const idx = {};
    for (let i=0; i<nDays; i++) {
      const d = new Date(start.getTime() + i*dayMs);
      idx[isoLocal(d)] = i;
      labels.push(d.getDate()+' '+MMM[d.getMonth()]);
      fullDates.push(fmtDate(d));
      salesArr.push(0); paidArr.push(0);
    }
    let tSales = 0, tPaid = 0, tPmc = 0;
    rows.forEach(r => {
      const i = idx[isoLocal(r.d)];
      if (i===undefined) return;
      salesArr[i] += r.sales; paidArr[i] += r.paid;
      tSales += r.sales; tPaid += r.paid; tPmc += r.pmc;
    });

    // tiles
    const due = tSales - tPaid;
    document.getElementById('sc-grid').style.display = 'grid';
    document.getElementById('k-sales').innerHTML = tk(tSales);
    document.getElementById('k-coll').innerHTML  = tk(tPaid);
    const kd = document.getElementById('k-due');
    kd.innerHTML = tk(due);
    kd.className = 'gtile-v ' + (due>0 ? 'neg' : 'pos');
    document.getElementById('k-crate').textContent = tSales ? Math.round(tPaid/tSales*100)+'%' : '—';

    // day-exact P&L, cash basis (matches sheet "Actual" columns):
    // GP = Paid − PMC (COGS) · Expense = dated register · NP = GP − Expense · % against Paid
    function setTile(id, html, cls) {
      const el = document.getElementById(id);
      el.innerHTML = html;
      el.className = 'gtile-v' + (cls ? ' '+cls : '');
    }
    const gp = tPaid - tPmc;
    setTile('k-gp',  tk(gp),            numClass(gp));
    setTile('k-gpp', pctOf(gp, tPaid),  numClass(gp));
    if (window._expLoaded) {
      let exp = 0;
      EXP_ROWS.forEach(e => { if (e.d >= start && e.d <= end) exp += e.amt; });
      const np = gp - exp;
      setTile('k-exp', tk(exp),           '');
      setTile('k-np',  tk(np),            numClass(np));
      setTile('k-npp', pctOf(np, tPaid),  numClass(np));
    } else {
      ['k-exp','k-np','k-npp'].forEach(id => setTile(id,'—',''));
    }

    // chart — dark panel styling
    document.getElementById('an-state').style.display = 'none';
    const cv = document.getElementById('trendChart');
    cv.style.display = 'block';
    if (trendChart) trendChart.destroy();
    trendChart = new Chart(cv, {
      data: {
        labels: labels,
        datasets: [
          { type:'bar',  label:'Sales',      data:salesArr,
            backgroundColor:'rgba(99,205,255,0.55)', hoverBackgroundColor:'rgba(99,205,255,0.85)',
            borderRadius:4, order:2 },
          { type:'line', label:'Collection', data:paidArr,
            borderColor:'#3fe0a8', backgroundColor:'rgba(63,224,168,0.12)',
            fill:true, tension:0.35, pointRadius:2, pointHoverRadius:5,
            pointBackgroundColor:'#3fe0a8', borderWidth:2, order:1 }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        interaction:{ mode:'index', intersect:false },
        plugins:{
          legend:{ labels:{ boxWidth:10, color:'rgba(255,255,255,.75)', font:{ family:'Inter', size:10, weight:'700' } } },
          tooltip:{
            backgroundColor:'#0d1b29', titleColor:'#fff', bodyColor:'rgba(255,255,255,.8)',
            callbacks:{
              title: items => items.length ? fullDates[items[0].dataIndex] : '',
              label: ctx => ' '+ctx.dataset.label+': '+fmt(ctx.parsed.y)+' tk'
            }
          }
        },
        scales:{
          x:{ grid:{ display:false }, ticks:{ color:'rgba(255,255,255,.5)', font:{ family:'Inter', size:9 }, maxRotation:0, autoSkip:true, maxTicksLimit:8 } },
          y:{ beginAtZero:true, grid:{ color:'rgba(255,255,255,.07)' }, ticks:{ color:'rgba(255,255,255,.5)', font:{ family:'Inter', size:9 }, callback:v => v>=1000 ? (v/1000)+'k' : v } }
        }
      }
    });

    // salesman table
    const by = {};
    rows.forEach(r => {
      const k = r.seller;
      if (!by[k]) by[k] = { sales:0, paid:0, clients:new Set() };
      by[k].sales += r.sales;
      by[k].paid  += r.paid;
      if (r.client) by[k].clients.add(r.client.toLowerCase());
    });
    const sellers = Object.keys(by).sort((a,b) => by[b].sales - by[a].sales);

    function ratePill(sales, paid) {
      if (!sales) return '<span class="rate-pill rate-mid">—</span>';
      const p = Math.round(paid/sales*100);
      const cls = p>=80 ? 'rate-hi' : p>=50 ? 'rate-mid' : 'rate-lo';
      return '<span class="rate-pill '+cls+'">'+p+'%</span>';
    }
    function dueCell(v) {
      if (v===0) return '<td>0</td>';
      const inner = '<span class="amt">'+fmt(v)+'<span class="tk">tk</span></span>';
      return v>0 ? '<td class="neg-t">'+inner+'</td>' : '<td class="pos-t">'+inner+'</td>';
    }

    let h = '<thead><tr><th>Seller</th><th>Sales</th><th>Coll.</th><th>Due</th><th>Collection Rate</th><th>Clients</th></tr></thead><tbody>';
    let totC = new Set();
    sellers.forEach(k => {
      const o = by[k];
      o.clients.forEach(c => totC.add(c));
      h += '<tr>'+
        '<td><div class="seller-cell"><div class="s-ava">'+initials(k)+'</div><span class="s-name">'+k+'</span></div></td>'+
        '<td>'+tk(o.sales)+'</td>'+
        '<td>'+tk(o.paid)+'</td>'+
        dueCell(o.sales - o.paid)+
        '<td>'+ratePill(o.sales, o.paid)+'</td>'+
        '<td>'+o.clients.size+'</td>'+
      '</tr>';
    });
    h += '<tr class="tot">'+
      '<td>Total</td><td>'+tk(tSales)+'</td><td>'+tk(tPaid)+'</td>'+
      dueCell(due)+'<td>'+ratePill(tSales, tPaid)+'</td><td>'+totC.size+'</td>'+
    '</tr></tbody>';
    document.getElementById('perf-tbl').innerHTML = h;
    document.getElementById('perf-section').style.display = 'block';
  };

  (function initAnalytics() {
    const now   = new Date();
    const first = new Date(now.getFullYear(), now.getMonth(), 1);
    const sEl = document.getElementById('d-start');
    const eEl = document.getElementById('d-end');
    sEl.value = isoLocal(first);
    eEl.value = isoLocal(now);
    sEl.max = isoLocal(now);
    eEl.max = isoLocal(now);
    document.getElementById('ds-show').textContent = fmtDate(first);
    document.getElementById('de-show').textContent = fmtDate(now);
    loadAnalytics();
  })();
</script>
</body>
</html>
