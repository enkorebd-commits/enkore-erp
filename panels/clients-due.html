<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clients Due — Enkore</title>
<style>
:root{
  --g:#1b6b3a;--g2:#2d8a52;--gbg:#edf7f1;--red:#e03131;--redbg:#fff5f5;
  --orange:#e67e22;--blue:#1971c2;--bluebg:#e7f1fb;--text:#1a1a2e;--muted:#868e96;
  --border:#dee2e6;--bg:#f3f4f6;--card:#fff;--r:12px;--sh:0 2px 8px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;overscroll-behavior:none}

/* HEADER + TABS (mirrors Sales panel) */
.hdr{color:#fff;padding:12px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:background .3s}
.hdr.dues{background:#c0392b}
.hdr.sales{background:var(--g)}
.hdr-title{font-size:16px;font-weight:800;letter-spacing:.3px;padding-bottom:12px}

.body{padding:14px;max-width:560px;margin:0 auto}

/* SUMMARY CARD */
.sum{border-radius:var(--r);padding:16px;margin-bottom:12px;color:#fff}
.sum.dues{background:linear-gradient(135deg,#c0392b,#e03131)}
.sum.sales{background:linear-gradient(135deg,#1b6b3a,#2d8a52)}
.sum-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;opacity:.85;margin-bottom:4px}
.sum-amt{font-size:30px;font-weight:900;letter-spacing:-.5px;line-height:1}
.sum-sub{font-size:12px;opacity:.85;margin-top:6px}

/* SEARCH */
.search{width:100%;padding:11px 14px;font-size:14px;border:1.5px solid var(--border);border-radius:10px;outline:none;background:#fff;color:var(--text);margin-bottom:12px}
.search:focus{border-color:var(--blue)}

/* LIST */
.list{display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:flex-start;gap:12px;background:var(--card);border-radius:var(--r);padding:12px 14px;box-shadow:var(--sh);cursor:pointer;transition:.12s}
.row:active{transform:scale(.99);background:#fafbfc}
.rank{flex-shrink:0;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;background:#f1f3f5;color:var(--muted)}
.rank.r1{background:#fff3bf;color:#b8860b}
.rank.r2{background:#e9ecef;color:#495057}
.rank.r3{background:#ffe8cc;color:#d9480f}
.row-main{flex:1;min-width:0}
.row-name{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.row-loc{font-size:11px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-tel-line{margin-top:5px}
.row-tel{display:inline-block;font-size:12px;color:var(--blue);font-weight:800;text-decoration:none;white-space:nowrap}
.row-tel:active{opacity:.6}
.tap-hint{font-size:9px;color:#adb5bd;margin-top:6px;font-weight:600;letter-spacing:.3px}

/* TRANSACTIONS POPUP */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.sheet{background:var(--bg);width:100%;max-width:560px;max-height:88vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;animation:up .22s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-hd{background:#c0392b;color:#fff;padding:14px 16px;border-radius:18px 18px 0 0;display:flex;align-items:flex-start;gap:10px;position:sticky;top:0}
.sheet-hd .sh-x{margin-left:auto;font-size:22px;line-height:1;cursor:pointer;opacity:.9;background:none;border:none;color:#fff;padding:0 2px}
.sh-name{font-size:15px;font-weight:800}
.sh-sub{font-size:11px;opacity:.85;margin-top:2px}
.sh-tel{display:inline-block;margin-top:6px;font-size:12px;font-weight:800;color:#fff;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px;text-decoration:none}
/* highlighted summary band — visually distinct from the transactions below */
.sheet-chips{display:flex;gap:8px;padding:14px 16px;background:var(--redbg);border-bottom:3px solid #ffd8d0;box-shadow:0 4px 10px rgba(192,57,43,.08)}
.chip{flex:1;text-align:center;background:#fff;border-radius:10px;padding:9px 4px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.chip-l{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.chip-v{font-size:15px;font-weight:900;margin-top:2px}
.chip-v.red{color:var(--red)}
.chip-v.grn{color:var(--g)}
.sheet-sec{padding:12px 16px 2px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 14px 24px;flex:1}
.txn{background:#fff;border-radius:12px;padding:11px 13px;margin-bottom:9px;box-shadow:var(--sh);border-left:4px solid var(--g)}
.txn.pay{border-left-color:var(--blue)}
.txn-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.txn-date{font-size:13px;font-weight:800}
.txn-seller{font-size:10px;color:var(--muted);font-weight:600}
.txn-prod{font-size:11.5px;color:#495057;line-height:1.5;margin-bottom:7px}
.txn-prod-item{padding:1px 0}
.txn-pay-tag{display:inline-block;font-size:11px;font-weight:800;color:var(--blue);background:var(--bluebg);padding:2px 8px;border-radius:6px}
.txn-amts{display:flex;gap:8px;flex-wrap:wrap}
.amt{flex:1;min-width:70px;background:var(--bg);border-radius:8px;padding:6px 8px;text-align:center}
.amt-l{font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.amt-v{font-size:13px;font-weight:900;margin-top:1px}
.amt-v.red{color:var(--red)}
.amt-v.grn{color:var(--g)}
.txn-cmt{font-size:10.5px;color:var(--muted);margin-top:6px;font-style:italic}
.sheet-loading,.sheet-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;font-weight:600}
.row-fig{flex-shrink:0;text-align:right}
.fig-primary{font-size:16px;font-weight:900;line-height:1.1}
.fig-primary.red{color:var(--red)}
.fig-primary.grn{color:var(--g)}
.fig-sec{font-size:10px;color:var(--muted);margin-top:2px;font-weight:600}
.fig-sec.red{color:var(--red)}

/* STATES */
.state{text-align:center;padding:48px 20px;color:var(--muted)}
.state-icon{font-size:34px;margin-bottom:8px}
.state-txt{font-size:13px;font-weight:600}
.spin{display:inline-block;width:16px;height:16px;border:2.5px solid #d0d4dc;border-top-color:var(--blue);border-radius:50%;animation:rot .6s linear infinite;vertical-align:-3px;margin-right:6px}
@keyframes rot{to{transform:rotate(360deg)}}

/* PULL TO REFRESH */
#ptrIndicator{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:8px;height:56px;margin-top:-56px;font-size:13px;font-weight:800;color:var(--muted);background:var(--bg);z-index:250;transition:margin-top .18s ease;pointer-events:none}
#ptrIndicator .ptr-spin{width:16px;height:16px;border:2.5px solid #d0d4dc;border-top-color:var(--blue);border-radius:50%;display:inline-block}
#ptrIndicator.ptr-loading .ptr-spin{animation:rot .6s linear infinite}

/* TOAST */
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:400;opacity:0;transition:.25s;max-width:90%;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.err{background:#c0392b}
</style>
</head>
<body>

<div id="ptrIndicator"><span class="ptr-spin"></span><span id="ptrText">Pull to refresh</span></div>

<div class="hdr dues" id="mainHdr">
  <div class="hdr-title">Clients Due Board</div>
</div>

<div class="body">
  <div class="sum dues" id="sumCard">
    <div class="sum-lbl" id="sumLbl">Total Outstanding Due</div>
    <div class="sum-amt" id="sumAmt">৳ 0</div>
    <div class="sum-sub" id="sumSub">—</div>
  </div>

  <input type="text" class="search" id="search" placeholder="Search name, shop, address or mobile…" oninput="render()" autocomplete="off">

  <div class="list" id="list">
    <div class="state"><div class="state-txt"><span class="spin"></span> Loading clients…</div></div>
  </div>
</div>

<!-- TRANSACTIONS POPUP -->
<div class="ov" id="txnOv">
  <div class="sheet">
    <div class="sheet-hd">
      <div>
        <div class="sh-name" id="shName">—</div>
        <div class="sh-sub" id="shSub"></div>
        <a class="sh-tel" id="shTel" style="display:none"></a>
      </div>
      <button class="sh-x" onclick="closeHistory()">×</button>
    </div>
    <div class="sheet-chips">
      <div class="chip"><div class="chip-l">Total Sales</div><div class="chip-v grn" id="shSales">৳ 0</div></div>
      <div class="chip"><div class="chip-l">Paid</div><div class="chip-v" id="shPaid">৳ 0</div></div>
      <div class="chip"><div class="chip-l">Running Due</div><div class="chip-v red" id="shDue">৳ 0</div></div>
    </div>
    <div class="sheet-sec">🧾 Detailed Transactions</div>
    <div class="sheet-body" id="shBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const SHEET_ID  = '1IQ9osZGRHOYN_7UtioTOpkAF92wQ9TvNR31jZWop_Lg';
const CACHE_KEY = 'enkore_clientsdue_data';
let clients = [], shownRows = [], _ptrBusy = false;

function tk(n){ if(n===''||n===null||n===undefined) return '৳ 0'; return '৳ '+Number(n||0).toLocaleString('en-IN'); }
function parseGviz(txt){ try{ const m=txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/); return m?JSON.parse(m[1]):null; }catch(_){ return null; } }
function ordinal(n){ const s=['th','st','nd','rd'],v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtGvizDate(cell){
  if(!cell) return {display:'',ts:0};
  let display=cell.f||String(cell.v||''), ts=0;
  if(cell.v){
    const m=String(cell.v).match(/Date\((\d+),(\d+),(\d+)\)/);
    if(m){ const dt=new Date(+m[1],+m[2],+m[3]); ts=dt.getTime();
      const mos=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      display=`${ordinal(dt.getDate())} ${mos[dt.getMonth()]}, ${String(dt.getFullYear()).slice(-2)}`;
    }
  }
  return {display,ts};
}
function toast(msg, type){ const t=document.getElementById('toast'); t.textContent=msg; t.className='show'+(type==='err'?' err':''); clearTimeout(window._tt); window._tt=setTimeout(()=>t.className='',2200); }

// ── DATA ─────────────────────────────────────────────────────
async function loadClients(){
  // 1) instant paint from cache
  try{
    const c=sessionStorage.getItem(CACHE_KEY);
    if(c){ clients=JSON.parse(c)||[]; render(); }
  }catch(_){}
  // 2) revalidate from sheet (stale-while-revalidate)
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Clients%20Info&t=${Date.now()}`;
    const txt=await fetch(url).then(r=>r.text());
    const rows=(parseGviz(txt)?.table.rows)||[];
    clients=rows.filter(r=>r.c?.[7]?.v).map(r=>({
      name:  r.c[2]?.v||'',
      shop:  r.c[3]?.v||'',
      loc:   r.c[4]?.v||'',
      zone:  r.c[5]?.v||'',
      phone: String(r.c[6]?.v||'').trim(),
      det:   r.c[7]?.v||'',
      sales: Number(r.c[8]?.v)||0,
      paid:  Number(r.c[9]?.v)||0,
      due:   Number(r.c[10]?.v)||0,
    }));
    try{ sessionStorage.setItem(CACHE_KEY, JSON.stringify(clients)); }catch(_){}
    render();
  }catch(e){
    console.error('clients load:', e);
    if(!clients.length){
      document.getElementById('list').innerHTML='<div class="state"><div class="state-icon">⚠️</div><div class="state-txt">Could not load. Pull down to retry.</div></div>';
    }
  }
}

// ── RENDER (dues only) ───────────────────────────────────────
function render(){
  const q=(document.getElementById('search').value||'').trim().toLowerCase();
  // Hide demo/test clients (name is literally "demo"); keep only clients with due > 0.
  const real=clients.filter(c=>(c.name||'').trim().toLowerCase()!=='demo');
  let rows=real.filter(c=>c.due>0);

  // search — matches name, shop, location, zone, mobile, full detail (like Sales panel)
  if(q) rows=rows.filter(c=>(c.name+' '+c.shop+' '+c.loc+' '+c.zone+' '+c.phone+' '+c.det).toLowerCase().includes(q));

  // sort: highest due first
  rows.sort((a,b)=>b.due-a.due);

  // summary
  const totalDue=real.reduce((s,c)=>s+(c.due>0?c.due:0),0);
  const cnt=real.filter(c=>c.due>0).length;
  document.getElementById('sumAmt').textContent=tk(totalDue);
  document.getElementById('sumSub').textContent=cnt+' client'+(cnt===1?'':'s')+' with due';

  // list
  const el=document.getElementById('list');
  if(!rows.length){
    el.innerHTML='<div class="state"><div class="state-icon">✅</div><div class="state-txt">No outstanding dues 🎉</div></div>';
    return;
  }
  shownRows=rows;
  el.innerHTML=rows.map((c,i)=>{
    const rank=i+1;
    const rankCls=rank<=3?('r'+rank):'';
    const sub=[c.shop,c.zone].filter(Boolean).join(' · ');
    const loc=c.loc||c.zone||'';
    const telLine=c.phone
      ? '<div class="row-tel-line"><a class="row-tel" href="tel:'+c.phone.replace(/[^0-9+]/g,'')+'" onclick="event.stopPropagation()">📞 '+escapeHtml(c.phone)+'</a></div>'
      : '';
    return '<div class="row" data-idx="'+i+'">'
      +'<div class="rank '+rankCls+'">'+rank+'</div>'
      +'<div class="row-main"><div class="row-name">'+escapeHtml(c.name||c.shop||'—')+'</div>'
        +(sub?'<div class="row-sub">'+escapeHtml(sub)+'</div>':'')
        +(loc?'<div class="row-loc">📍 '+escapeHtml(loc)+'</div>':'')
        +telLine
      +'</div>'
      +'<div class="row-fig"><div class="fig-primary red">'+tk(c.due)+'</div><div class="fig-sec">Sales '+tk(c.sales)+'</div></div>'
      +'</div>';
  }).join('');
}

// ── TRANSACTIONS POPUP ───────────────────────────────────────
function groupTxns(rows){
  // rows in sheet (chronological) order; group by Invoice No, else by date.
  const groups=[], seen=new Map();
  rows.forEach(r=>{
    const key=r.invoiceNo?('inv_'+r.invoiceNo):(r.dateDisplay||String(r.dateTs));
    if(!seen.has(key)){
      const g={dateDisplay:r.dateDisplay,dateTs:r.dateTs,invoiceNo:r.invoiceNo||'',seller:'',products:[],totalBill:0,totalPaid:0,due:undefined,comment:''};
      seen.set(key,g); groups.push(g);
    }
    const g=seen.get(key);
    if(r.seller)  g.seller=r.seller;
    if(r.comment) g.comment=r.comment;
    if(r.prod){ g.products.push({name:r.prod,qty:r.qty,final:r.final||r.bill}); g.totalBill+=(r.final||r.bill||0); }
    if(r.paid) g.totalPaid+=r.paid;
    if(r.due!==undefined) g.due=r.due;
  });
  return groups.reverse(); // newest first
}

async function openHistory(c){
  document.getElementById('shName').textContent=c.name||c.shop||'—';
  document.getElementById('shSub').textContent=[c.shop,c.loc,c.zone].filter(Boolean).join(', ')||'—';
  const tel=document.getElementById('shTel');
  if(c.phone){ tel.style.display='inline-block'; tel.textContent='📞 '+c.phone; tel.href='tel:'+c.phone.replace(/[^0-9+]/g,''); }
  else tel.style.display='none';
  document.getElementById('shSales').textContent=tk(c.sales);
  document.getElementById('shPaid').textContent =tk(c.paid);
  document.getElementById('shDue').textContent  =tk(c.due);
  document.getElementById('shBody').innerHTML='<div class="sheet-loading"><span class="spin"></span> Loading transactions…</div>';
  document.getElementById('txnOv').classList.add('open');
  document.body.style.overflow='hidden';

  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sale%20Entry&t=${Date.now()}`;
    const data=parseGviz(await fetch(url).then(r=>r.text()));
    if(!data) throw new Error('parse');
    const rows=(data.table.rows||[]).filter(r=>r.c?.[1]?.v===c.det).map(r=>{
      const di=fmtGvizDate(r.c[0]);
      return {
        dateDisplay:di.display, dateTs:di.ts,
        prod:r.c[3]?.v||'', bill:r.c[7]?.v||0, final:r.c[9]?.v||0,
        qty:r.c[6]?.v||0, paid:r.c[12]?.v||0, due:r.c[13]?.v,
        comment:r.c[14]?.v||'', seller:r.c[15]?.v||'', invoiceNo:r.c[23]?.v||''
      };
    });
    renderTxns(groupTxns(rows));
  }catch(e){
    console.error('txn load:',e);
    document.getElementById('shBody').innerHTML='<div class="sheet-empty">Failed to load. Check internet.</div>';
  }
}

function renderTxns(groups){
  const el=document.getElementById('shBody');
  if(!groups.length){ el.innerHTML='<div class="sheet-empty">No transactions yet.</div>'; return; }
  el.innerHTML=groups.map(g=>{
    const isPay=g.products.length===0;
    const prodLine=isPay
      ? '<span class="txn-pay-tag">💳 Payment / Collection</span>'
      : g.products.map(p=>'<div class="txn-prod-item">• '+escapeHtml(p.name)+' <b>×'+p.qty+'</b></div>').join('');
    const dueVal=g.due!==undefined?g.due:'';
    return '<div class="txn'+(isPay?' pay':'')+'">'
      +'<div class="txn-top"><span class="txn-date">'+escapeHtml(g.dateDisplay||'—')+(g.invoiceNo?' · #'+escapeHtml(g.invoiceNo):'')+'</span><span class="txn-seller">'+escapeHtml(g.seller||'')+'</span></div>'
      +'<div class="txn-prod">'+prodLine+'</div>'
      +'<div class="txn-amts">'
        +(isPay?'':'<div class="amt"><div class="amt-l">Bill</div><div class="amt-v">'+tk(g.totalBill)+'</div></div>')
        +'<div class="amt"><div class="amt-l">Paid</div><div class="amt-v grn">'+tk(g.totalPaid)+'</div></div>'
        +'<div class="amt"><div class="amt-l">Due</div><div class="amt-v red">'+tk(dueVal)+'</div></div>'
      +'</div>'
      +(g.comment?'<div class="txn-cmt">📝 '+escapeHtml(g.comment)+'</div>':'')
      +'</div>';
  }).join('');
}

function closeHistory(){
  document.getElementById('txnOv').classList.remove('open');
  document.body.style.overflow='';
}

// ── PULL TO REFRESH ──────────────────────────────────────────
async function forceRefresh(){
  if(_ptrBusy) return;
  _ptrBusy=true;
  const ind=document.getElementById('ptrIndicator');
  ind.classList.add('ptr-loading');
  document.getElementById('ptrText').textContent='Refreshing…';
  try{ sessionStorage.removeItem(CACHE_KEY); }catch(_){}
  try{ await loadClients(); toast('✅ Refreshed'); }
  catch(e){ toast('Refresh failed','err'); }
  finally{
    _ptrBusy=false;
    ind.classList.remove('ptr-loading');
    document.getElementById('ptrText').textContent='Pull to refresh';
  }
}

function initPullToRefresh(){
  const ind=document.getElementById('ptrIndicator');
  const txt=document.getElementById('ptrText');
  const MAX=90, FIRE=60;
  let startY=0, pulling=false, dist=0;
  document.addEventListener('touchstart', e=>{
    if(_ptrBusy||window.scrollY>0){ pulling=false; return; }
    startY=e.touches[0].clientY; pulling=true;
  },{passive:true});
  document.addEventListener('touchmove', e=>{
    if(!pulling||_ptrBusy) return;
    dist=e.touches[0].clientY-startY;
    if(dist<=0){ dist=0; ind.style.marginTop='-56px'; return; }
    if(window.scrollY>0){ pulling=false; return; }
    const eased=Math.min(MAX,dist*0.5);
    ind.style.marginTop=(eased-56)+'px';
    txt.textContent=eased>=FIRE?'Release to refresh':'Pull to refresh';
  },{passive:true});
  document.addEventListener('touchend', ()=>{
    if(!pulling) return;
    pulling=false;
    const eased=Math.min(MAX,dist*0.5);
    if(eased>=FIRE){ ind.style.marginTop='0px'; forceRefresh().then(()=>{ ind.style.marginTop='-56px'; }); }
    else ind.style.marginTop='-56px';
    dist=0;
  });
}

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', ()=>{
  loadClients();
  initPullToRefresh();
  // Tap a client card → open its transactions (ignore taps on the phone link).
  document.getElementById('list').addEventListener('click', e=>{
    if(e.target.closest('.row-tel')) return;
    const row=e.target.closest('.row'); if(!row) return;
    const c=shownRows[+row.dataset.idx]; if(c) openHistory(c);
  });
  // Tap dark backdrop to close the popup.
  document.getElementById('txnOv').addEventListener('click', e=>{
    if(e.target.id==='txnOv') closeHistory();
  });
});
