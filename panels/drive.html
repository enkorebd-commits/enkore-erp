<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root { --blue:#29ABE2; }
    body {
      font-family:'Inter','Segoe UI',sans-serif;
      background:#f4f6f8; height:100vh;
      display:flex; flex-direction:column; overflow:hidden;
    }

    /* TAB BAR */
    .tab-bar {
      background:#fff; border-bottom:1px solid #e8e8e8;
      display:flex; align-items:center; height:48px; padding:0 4px;
      overflow-x:auto; gap:2px; flex-shrink:0;
      -webkit-overflow-scrolling:touch; scrollbar-width:none;
    }
    .tab-bar::-webkit-scrollbar { display:none; }
    .folder-tab {
      display:flex; align-items:center; gap:7px;
      padding:0 16px; height:48px; cursor:pointer;
      font-size:13px; font-weight:500; color:#888;
      border-bottom:2px solid transparent;
      transition:all 0.15s; white-space:nowrap; flex-shrink:0;
      user-select:none; -webkit-tap-highlight-color:transparent;
    }
    .folder-tab:active { background:#f5f5f5; }
    .folder-tab.active { color:#111; border-bottom-color:var(--blue); font-weight:600; }

    /* LOADING BAR */
    .loading-bar {
      height:2px; background:var(--blue);
      width:0; transition:width 0.5s ease;
      flex-shrink:0;
    }

    /* DRIVE FRAME */
    .drive-frame { flex:1; width:100%; border:none; display:block; background:#fff; }

    /* NO ACCESS */
    .no-access {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      color:#aaa; text-align:center; padding:40px; gap:10px;
    }
  </style>
</head>
<body>

<div class="tab-bar" id="tab-bar"></div>
<div class="loading-bar" id="loading-bar"></div>
<iframe class="drive-frame" id="drive-frame" src="about:blank" title="Google Drive"></iframe>

<script>
  const params = new URLSearchParams(window.location.search);
  const userId = params.get('userId') || '';
  if (!userId) window.location.replace('../enkore-erp.html');

  const FOLDERS = {
    ops:   { name:'Operations',            id:'1dfxMLytCzB31VYLuZwdpIa01b-K2Zw0g', icon:'⚙️' },
    fin:   { name:'Finance',               id:'1f3ZaTcAoQXYdi3pHOEdHLWJDFZRUFwhx', icon:'💰' },
    sales: { name:'Sales',                 id:'1KHl2DJbhNAeqfnnkLeQ2FnkvLBgi5a5j', icon:'📊' },
    mkt:   { name:'Marketing',             id:'1iUc2_GvNdIcld5N-efoesuZnEE0KSPka', icon:'📣' },
    pp:    { name:'Planning & Production', id:'1b_ZyI0gYSqN9n6369wSzL0039iCtApY4', icon:'🏭' },
    sc:    { name:'Supply Chain',          id:'1aYRoKWZ9ZzMVlBZmVk1k82cNBUv18VQo', icon:'🚚' },
    ir:    { name:'Investor Relations',    id:'15NpU64cIimEOpWjKQn5PMXqtLdqA_4NN', icon:'💼' },
  };

  const ROLE_ACCESS = {
    '1011100001': ['ops','fin','sales','mkt','pp','sc','ir'],
    '1011100002': ['sc','ops','pp'],
    '1011100003': ['ops','pp'],
    '1011100004': ['ops','fin','sales','mkt','pp','sc','ir'],
    '1012100005': ['pp'],
    '1011100006': ['mkt','sales'],
    '1011100007': ['ops','fin','sales','mkt','pp','sc','ir'],
  };

  const allowed = ROLE_ACCESS[userId] || [];

  function loadFolder(key) {
    document.querySelectorAll('.folder-tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
    const bar = document.getElementById('loading-bar');
    bar.style.transition = 'width 0.5s ease';
    bar.style.width = '60%';
    setTimeout(() => { bar.style.width = '100%'; }, 400);
    setTimeout(() => {
      bar.style.transition = 'none';
      bar.style.width = '0';
      setTimeout(() => { bar.style.transition = 'width 0.5s ease'; }, 50);
    }, 900);
    document.getElementById('drive-frame').src =
      'https://drive.google.com/embeddedfolderview?id=' + FOLDERS[key].id + '#list';
  }

  function buildTabs() {
    const bar = document.getElementById('tab-bar');
    if (allowed.length === 0) {
      bar.style.display = 'none';
      document.getElementById('drive-frame').remove();
      document.getElementById('loading-bar').remove();
      document.body.insertAdjacentHTML('beforeend', `
        <div class="no-access">
          <span style="font-size:36px">🔒</span>
          <strong style="color:#555">Access Restricted</strong>
          <span>Contact your administrator.</span>
        </div>`);
      return;
    }
    allowed.forEach((key, i) => {
      const f = FOLDERS[key];
      if (!f) return;
      const tab = document.createElement('div');
      tab.className = 'folder-tab' + (i === 0 ? ' active' : '');
      tab.dataset.key = key;
      tab.innerHTML = `<span>${f.icon}</span>${f.name}`;
      tab.onclick = () => loadFolder(key);
      bar.appendChild(tab);
    });
    loadFolder(allowed[0]);
  }

  buildTabs();
</script>
</body>
</html>
