<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root { --blue:#29ABE2; }
    body {
      font-family:'Inter','Segoe UI',sans-serif;
      background:#f4f6f8; height:100vh;
      display:flex; flex-direction:column; overflow:hidden;
    }

    /* TAB BAR */
    .tab-bar {
      background:#fff; border-bottom:1px solid #e8e8e8;
      display:flex; align-items:center; height:48px; padding:0 4px;
      overflow-x:auto; gap:2px; flex-shrink:0;
      -webkit-overflow-scrolling:touch; scrollbar-width:none;
    }
    .tab-bar::-webkit-scrollbar { display:none; }
    .folder-tab {
      display:flex; align-items:center; gap:7px;
      padding:0 16px; height:48px; cursor:pointer;
      font-size:13px; font-weight:500; color:#888;
      border-bottom:2px solid transparent;
      transition:all 0.15s; white-space:nowrap; flex-shrink:0;
      user-select:none;
    }
    .folder-tab:active { background:#f9f9f9; }
    .folder-tab.active { color:#111; border-bottom-color:var(--blue); font-weight:600; }

    /* TREE VIEW */
    #tree-view {
      flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    }

    .tree-loading, .tree-state {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:200px; color:#aaa; gap:10px; font-size:13px; text-align:center; padding:24px;
    }
    .state-icon { font-size:32px; }

    /* FOLDER ROW */
    .tree-folder {
      display:flex; align-items:center; gap:10px;
      padding:13px 16px; cursor:pointer;
      border-bottom:1px solid #efefef;
      background:#fff; user-select:none;
      transition:background 0.1s;
    }
    .tree-folder:active { background:#f5f5f5; }
    .tf-icon { font-size:16px; flex-shrink:0; width:22px; text-align:center; }
    .tf-name { flex:1; font-size:13px; color:#111; font-weight:500; }
    .tf-arrow {
      font-size:18px; color:#ccc; transition:transform 0.2s;
      line-height:1; flex-shrink:0;
    }
    .tree-folder.open .tf-arrow { transform:rotate(90deg); color:#888; }

    /* SUBFOLDER FILES */
    .subfolder-files { display:none; }
    .subfolder-files.open { display:block; }

    /* FILE ROW */
    .tree-file {
      display:flex; align-items:center; gap:10px;
      padding:12px 16px; cursor:pointer;
      border-bottom:1px solid #f5f5f5;
      user-select:none; transition:background 0.1s;
    }
    .tree-file:active { background:#e8f5fb; }
    .tree-file.indented { padding-left:48px; background:#fafafa; }
    .tree-file .tf-name { color:#333; font-size:13px; font-weight:400; }
    .tree-file .tf-meta { font-size:11px; color:#bbb; margin-left:auto; flex-shrink:0; }

    /* FILE VIEWER */
    #file-viewer {
      display:none; flex-direction:column; flex:1;
    }
    .viewer-bar {
      display:flex; align-items:center; gap:10px;
      padding:0 12px; height:46px; background:#fff;
      border-bottom:1px solid #e8e8e8; flex-shrink:0;
    }
    .btn-back {
      display:flex; align-items:center; gap:4px;
      padding:7px 12px; background:#f2f2f2; border:none;
      border-radius:8px; font-size:12px; font-weight:600;
      color:#444; cursor:pointer; font-family:inherit;
      flex-shrink:0; white-space:nowrap;
    }
    .btn-back:active { background:#e8e8e8; }
    .viewer-filename {
      flex:1; font-size:13px; font-weight:500; color:#111;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    #viewer-frame { flex:1; width:100%; border:none; background:#fff; display:block; }

    /* SETUP CARD */
    .setup-card {
      margin:16px; padding:18px; background:#fff;
      border:1px solid #e8e8e8; border-radius:12px;
      font-size:13px; color:#555; line-height:1.7;
    }
    .setup-card strong { color:#111; display:block; margin-bottom:6px; }
    .setup-card code {
      background:#f4f6f8; padding:2px 7px;
      border-radius:5px; font-size:12px; color:#333;
    }
    .setup-cols {
      display:grid; grid-template-columns:repeat(5,1fr);
      gap:4px; margin-top:10px;
    }
    .setup-col {
      background:#f4f6f8; padding:6px 8px; border-radius:6px;
      text-align:center; font-size:11px; font-weight:600; color:#555;
    }

    /* NO ACCESS */
    .no-access {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      color:#aaa; text-align:center; padding:40px; gap:10px;
    }
  </style>
</head>
<body>

<div class="tab-bar" id="tab-bar"></div>
<div id="tree-view"></div>
<div id="file-viewer">
  <div class="viewer-bar">
    <button class="btn-back" onclick="closeViewer()">‹ Back</button>
    <span class="viewer-filename" id="viewer-filename"></span>
  </div>
  <iframe id="viewer-frame" src="about:blank" allowfullscreen></iframe>
</div>

<script>
  const SHEET_ID = '1mXI0MI9R_5_ImxiTvw8vH0EaQ38M3WlHncjZgmPLTmc';
  const params   = new URLSearchParams(window.location.search);
  const userId   = params.get('userId') || '';
  if (!userId) window.location.replace('../enkore-erp.html');

  const FOLDERS = {
    ops:   { name:'Operations',            icon:'⚙️' },
    fin:   { name:'Finance',               icon:'💰' },
    sales: { name:'Sales',                 icon:'📊' },
    mkt:   { name:'Marketing',             icon:'📣' },
    pp:    { name:'Planning & Production', icon:'🏭' },
    sc:    { name:'Supply Chain',          icon:'🚚' },
    ir:    { name:'Investor Relations',    icon:'💼' },
  };

  const ROLE_ACCESS = {
    '1011100001': ['ops','fin','sales','mkt','pp','sc','ir'],
    '1011100002': ['sc','ops','pp'],
    '1011100003': ['ops','pp'],
    '1011100004': ['ops','fin','sales','mkt','pp','sc','ir'],
    '1012100005': ['pp'],
    '1011100006': ['mkt','sales'],
    '1011100007': ['ops','fin','sales','mkt','pp','sc','ir'],
  };

  const allowed = ROLE_ACCESS[userId] || [];
  let allFiles  = [];

  // ── FETCH DriveFiles SHEET ──
  async function fetchDriveFiles() {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=DriveFiles&t=${Date.now()}`;
    try {
      const resp = await fetch(url);
      if (!resp.ok) return [];
      const text = await resp.text();
      const match = text.match(/setResponse\(([\s\S]*)\)\s*;?\s*$/);
      if (!match) return [];
      const data = JSON.parse(match[1]);
      if (!data.table || !data.table.rows) return [];
      const cols = data.table.cols.map(c => (c.label||c.id||'').toLowerCase().trim());
      return data.table.rows.map(r => {
        const obj = {};
        (r.c||[]).forEach((cell, i) => {
          obj[cols[i]] = (cell && cell.v != null) ? String(cell.v).trim() : '';
        });
        return obj;
      }).filter(r => r.folder && r.name && r.id);
    } catch(e) { return []; }
  }

  // ── ICONS & PREVIEW URLs ──
  function getIcon(type) {
    const map = { doc:'📝', sheet:'📊', slide:'📈', form:'📋', pdf:'📕', image:'🖼️', video:'🎬', folder:'📁' };
    return map[(type||'').toLowerCase()] || '📄';
  }

  function getPreviewUrl(id, type) {
    const t = (type||'').toLowerCase();
    if (t === 'doc')   return `https://docs.google.com/document/d/${id}/preview`;
    if (t === 'sheet') return `https://docs.google.com/spreadsheets/d/${id}/preview`;
    if (t === 'slide') return `https://docs.google.com/presentation/d/${id}/preview`;
    if (t === 'form')  return `https://docs.google.com/forms/d/${id}/viewform?embedded=true`;
    return `https://drive.google.com/file/d/${id}/preview`;
  }

  // ── SHOW TREE FOR A FOLDER KEY ──
  function showTree(folderKey) {
    const tv = document.getElementById('tree-view');
    document.getElementById('file-viewer').style.display = 'none';
    document.getElementById('viewer-frame').src = 'about:blank';
    tv.style.display = '';

    const folderFiles = allFiles.filter(f => f.folder === folderKey);

    if (folderFiles.length === 0) {
      tv.innerHTML = `
        <div class="setup-card">
          <strong>No files configured for this section yet.</strong>
          To add files here, create a sheet tab called <code>DriveFiles</code>
          in your ERP Google Sheet with these columns:<br>
          <div class="setup-cols">
            <div class="setup-col">folder</div>
            <div class="setup-col">subfolder</div>
            <div class="setup-col">name</div>
            <div class="setup-col">id</div>
            <div class="setup-col">type</div>
          </div><br>
          Set <code>folder</code> to <code>${folderKey}</code> for this section.
          The <code>id</code> is the file's Google Drive ID from its URL.
          Types: <code>doc</code> · <code>sheet</code> · <code>slide</code> · <code>pdf</code> · <code>image</code>
        </div>`;
      return;
    }

    // Group files by subfolder
    const subfolders = {};
    const rootFiles  = [];
    folderFiles.forEach(f => {
      if (f.subfolder) {
        (subfolders[f.subfolder] = subfolders[f.subfolder] || []).push(f);
      } else {
        rootFiles.push(f);
      }
    });

    let html = '';

    // Subfolders (accordion)
    Object.entries(subfolders).forEach(([sf, files]) => {
      html += `
        <div class="tree-folder" onclick="toggleFolder(this)">
          <span class="tf-icon">📁</span>
          <span class="tf-name">${sf}</span>
          <span class="tf-arrow">›</span>
        </div>
        <div class="subfolder-files">
          ${files.map(f => fileRow(f, true)).join('')}
        </div>`;
    });

    // Root-level files
    html += rootFiles.map(f => fileRow(f, false)).join('');

    tv.innerHTML = html;
  }

  function fileRow(f, indented) {
    const icon    = getIcon(f.type);
    const safeName = f.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="tree-file${indented ? ' indented' : ''}" onclick="openFile('${f.id}','${safeName}','${f.type}')">
      <span class="tf-icon">${icon}</span>
      <span class="tf-name">${f.name}</span>
    </div>`;
  }

  function toggleFolder(el) {
    const sub    = el.nextElementSibling;
    const isOpen = sub.classList.toggle('open');
    el.classList.toggle('open', isOpen);
  }

  // ── FILE VIEWER ──
  function openFile(id, name, type) {
    document.getElementById('viewer-filename').textContent = name;
    document.getElementById('viewer-frame').src = getPreviewUrl(id, type);
    document.getElementById('tree-view').style.display = 'none';
    document.getElementById('file-viewer').style.display = 'flex';
  }

  function closeViewer() {
    document.getElementById('viewer-frame').src = 'about:blank';
    document.getElementById('file-viewer').style.display = 'none';
    document.getElementById('tree-view').style.display = '';
  }

  // ── BUILD TABS ──
  function buildTabs() {
    const bar = document.getElementById('tab-bar');
    bar.innerHTML = '';

    if (allowed.length === 0) {
      bar.style.display = 'none';
      document.getElementById('tree-view').innerHTML = `
        <div class="no-access">
          <span style="font-size:36px">🔒</span>
          <strong style="color:#555">Access Restricted</strong>
          <span>Contact your administrator.</span>
        </div>`;
      return;
    }

    allowed.forEach((key, i) => {
      const f = FOLDERS[key];
      if (!f) return;
      const tab = document.createElement('div');
      tab.className = 'folder-tab' + (i === 0 ? ' active' : '');
      tab.dataset.key = key;
      tab.innerHTML = `<span>${f.icon}</span>${f.name}`;
      tab.onclick = () => {
        document.querySelectorAll('.folder-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        showTree(key);
      };
      bar.appendChild(tab);
    });
  }

  // ── INIT ──
  async function init() {
    document.getElementById('tree-view').innerHTML = '<div class="tree-loading"><span class="state-icon">⏳</span>Loading files...</div>';
    buildTabs();
    allFiles = await fetchDriveFiles();
    if (allowed.length > 0) showTree(allowed[0]);
  }

  init();
</script>
</body>
</html>
