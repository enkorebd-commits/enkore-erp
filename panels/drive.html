<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drive</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root { --blue:#29ABE2; }
    body {
      font-family:'Inter','Segoe UI',sans-serif;
      background:#f4f6f8; height:100vh;
      display:flex; flex-direction:column; overflow:hidden;
    }

    .tab-bar {
      background:#fff; border-bottom:1px solid #e8e8e8;
      display:flex; align-items:center; height:48px; padding:0 4px;
      overflow-x:auto; gap:2px; flex-shrink:0;
      -webkit-overflow-scrolling:touch; scrollbar-width:none;
    }
    .tab-bar::-webkit-scrollbar { display:none; }
    .folder-tab {
      display:flex; align-items:center; gap:7px;
      padding:0 16px; height:48px; cursor:pointer;
      font-size:13px; font-weight:500; color:#888;
      border-bottom:2px solid transparent;
      transition:all 0.15s; white-space:nowrap; flex-shrink:0;
      user-select:none;
    }
    .folder-tab:active { background:#f5f5f5; }
    .folder-tab.active { color:#111; border-bottom-color:var(--blue); font-weight:600; }
    .tab-dot {
      width:6px; height:6px; border-radius:50%;
      background:#e0e0e0; flex-shrink:0;
    }
    .tab-dot.loaded { background:#34a853; }

    .loading-bar {
      height:2px; background:var(--blue);
      width:0; transition:width 0.4s ease; flex-shrink:0;
    }

    /* pull-to-refresh indicator */
    #ptrIndicator {
      position:fixed; top:0; left:0; right:0; height:48px; margin-top:-48px;
      display:flex; align-items:center; justify-content:center; gap:8px;
      background:#f4f6f8; color:#888; font-size:13px; font-weight:500;
      z-index:60; transition:margin-top .18s ease; pointer-events:none;
    }
    #ptrIndicator .ptr-spin { width:15px; height:15px; border:2px solid #dfe3e8; border-top-color:var(--blue); border-radius:50%; display:inline-block; }
    #ptrIndicator.ptr-loading .ptr-spin { animation:ptrspin .7s linear infinite; }
    @keyframes ptrspin { to { transform:rotate(360deg); } }

    .breadcrumb {
      background:#fff; border-bottom:1px solid #f0f0f0;
      padding:0 16px; height:36px;
      display:flex; align-items:center; gap:4px;
      overflow-x:auto; flex-shrink:0;
      -webkit-overflow-scrolling:touch; scrollbar-width:none;
    }
    .breadcrumb::-webkit-scrollbar { display:none; }
    .bc-item {
      font-size:12px; color:var(--blue); cursor:pointer;
      white-space:nowrap; font-weight:500;
    }
    .bc-item:last-child { color:#555; cursor:default; font-weight:600; }
    .bc-sep { font-size:12px; color:#ccc; }

    .file-list {
      flex:1; overflow-y:auto; padding:8px 0;
      -webkit-overflow-scrolling:touch;
    }
    .file-item {
      display:flex; align-items:center; gap:12px;
      padding:10px 16px; cursor:pointer;
      border-bottom:1px solid #f0f0f0;
      transition:background 0.1s;
    }
    .file-item:active { background:#f0f8fd; }
    .file-icon { width:20px; height:20px; flex-shrink:0; object-fit:contain; }
    .file-name { font-size:13px; color:#222; font-weight:500; flex:1; line-height:1.3; }
    .file-arrow { font-size:13px; color:#ccc; flex-shrink:0; }

    .state-box {
      padding:60px 40px; display:flex; flex-direction:column;
      align-items:center; gap:10px; color:#aaa; text-align:center;
    }
    .state-box .icon { font-size:32px; }
    .state-box .msg { font-size:13px; }

  </style>
</head>
<body>

<div id="ptrIndicator"><span class="ptr-spin"></span><span id="ptrText">Pull to refresh</span></div>

<div class="tab-bar" id="tab-bar"></div>
<div class="loading-bar" id="loading-bar"></div>
<div class="breadcrumb" id="breadcrumb"></div>
<div class="file-list" id="file-list"></div>

<script>
  const SCRIPT_URL = 'https://rapid-credit-0593.enkorebd.workers.dev';
  const ICON_BASE = 'https://drive-thirdparty.googleusercontent.com/16/type/';

  const params = new URLSearchParams(window.location.search);
  const userId = params.get('userId') || '';
  if (!userId) window.location.replace('../enkore-erp.html');

  const FOLDERS = {
    ops:   { name:'Operations',            id:'1dfxMLytCzB31VYLuZwdpIa01b-K2Zw0g' },
    fin:   { name:'Finance',               id:'1f3ZaTcAoQXYdi3pHOEdHLWJDFZRUFwhx' },
    sales: { name:'Sales',                 id:'1KHl2DJbhNAeqfnnkLeQ2FnkvLBgi5a5j' },
    mkt:   { name:'Marketing',             id:'1iUc2_GvNdIcld5N-efoesuZnEE0KSPka' },
    pp:    { name:'Planning & Production', id:'1b_ZyI0gYSqN9n6369wSzL0039iCtApY4' },
    sc:    { name:'Supply Chain',          id:'1aYRoKWZ9ZzMVlBZmVk1k82cNBUv18VQo' },
    ir:    { name:'Investor Relations',    id:'15NpU64cIimEOpWjKQn5PMXqtLdqA_4NN' },
  };

  // All users with Drive panel access see all folders
  const allowed = Object.keys(FOLDERS);
  const cache = {};          // folderId -> data
  let breadcrumbStack = [];
  let activeTabKey = null;
  let _refreshing = false;

  // ── PERSISTENT CACHE (stale-while-revalidate) ──
  const DRIVE_CACHE_KEY = 'enkore_drive_cache_v1';
  try { Object.assign(cache, JSON.parse(localStorage.getItem(DRIVE_CACHE_KEY) || '{}') || {}); } catch(_) {}
  function saveDriveCache() { try { localStorage.setItem(DRIVE_CACHE_KEY, JSON.stringify(cache)); } catch(_) {} }

  function iconUrl(mime) {
    if (!mime) mime = 'application/octet-stream';
    return ICON_BASE + encodeURIComponent(mime);
  }

  function folderIconUrl() {
    return ICON_BASE + encodeURIComponent('application/vnd.google-apps.folder');
  }

  function showLoading(on) {
    const bar = document.getElementById('loading-bar');
    if (on) {
      bar.style.transition = 'width 0.4s ease';
      bar.style.width = '70%';
    } else {
      bar.style.width = '100%';
      setTimeout(function() {
        bar.style.transition = 'none';
        bar.style.width = '0';
      }, 300);
    }
  }

  function renderBreadcrumb() {
    const bc = document.getElementById('breadcrumb');
    bc.innerHTML = '';
    breadcrumbStack.forEach(function(item, i) {
      if (i > 0) {
        const sep = document.createElement('span');
        sep.className = 'bc-sep';
        sep.textContent = '›';
        bc.appendChild(sep);
      }
      const el = document.createElement('span');
      el.className = 'bc-item';
      el.textContent = item.name;
      if (i < breadcrumbStack.length - 1) {
        (function(idx){ el.onclick = function(){ navigateTo(idx); }; })(i);
      }
      bc.appendChild(el);
    });
    bc.scrollLeft = bc.scrollWidth;
  }

  function navigateTo(idx) {
    breadcrumbStack = breadcrumbStack.slice(0, idx + 1);
    renderBreadcrumb();
    showFolder(breadcrumbStack[breadcrumbStack.length - 1].id);
  }

  // Show from cache immediately, no network call
  function showFolder(folderId) {
    const data = cache[folderId];
    if (data) {
      renderItems(data);
    } else {
      // subfolder not yet cached — fetch it
      fetchFolder(folderId, function(data) {
        renderItems(data);
      });
    }
  }

  function fetchFolder(folderId, cb, force) {
    if (!force && cache[folderId]) { cb(cache[folderId]); return; }
    const cbName = 'cb_' + folderId.replace(/[^a-z0-9]/gi,'') + '_' + Date.now();
    window[cbName] = function(data) {
      delete window[cbName];
      cache[folderId] = data;
      if (data && data.ok) saveDriveCache();   // persist successful listings
      cb(data);
    };
    const script = document.createElement('script');
    script.onerror = function() {
      cache[folderId] = { ok:false, error:'Network error' };
      cb(cache[folderId]);
    };
    script.src = SCRIPT_URL + '?folderId=' + encodeURIComponent(folderId) + '&callback=' + cbName;
    document.head.appendChild(script);
  }

  function renderItems(data) {
    const fl = document.getElementById('file-list');
    fl.innerHTML = '';
    if (!data || !data.ok) {
      fl.innerHTML = '<div class="state-box"><span class="icon">⚠️</span><span class="msg">' + (data && data.error ? data.error : 'Error loading folder') + '</span></div>';
      return;
    }
    if (!data.items || data.items.length === 0) {
      fl.innerHTML = '<div class="state-box"><span class="icon">📭</span><span class="msg">This folder is empty.</span></div>';
      return;
    }
    data.items.forEach(function(item) {
      const div = document.createElement('div');
      div.className = 'file-item';
      const imgSrc = item.type === 'folder' ? folderIconUrl() : iconUrl(item.mime);
      div.innerHTML =
        '<img class="file-icon" src="' + imgSrc + '" alt="" onerror="this.style.display=\'none\'">' +
        '<span class="file-name">' + item.name + '</span>' +
        '<span class="file-arrow">' + (item.type === 'folder' ? '›' : '↗') + '</span>';
      if (item.type === 'folder') {
        div.onclick = function() {
          breadcrumbStack.push({ id: item.id, name: item.name });
          renderBreadcrumb();
          showFolder(item.id);
        };
      } else {
        div.onclick = function() { window.open(item.url, '_blank'); };
      }
      fl.appendChild(div);
    });
  }

  function loadTab(key) {
    activeTabKey = key;
    document.querySelectorAll('.folder-tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.key === key);
    });
    const f = FOLDERS[key];
    breadcrumbStack = [{ id: f.id, name: f.name }];
    renderBreadcrumb();
    showFolder(f.id);
  }

  // Pre-fetch all allowed root folders on startup (once at login)
  function prefetchAll() {
    let remaining = allowed.length;
    allowed.forEach(function(key) {
      const f = FOLDERS[key];
      if (!f) { remaining--; return; }
      fetchFolder(f.id, function() {
        remaining--;
        // update dot indicator for this tab
        const tab = document.querySelector('.folder-tab[data-key="' + key + '"]');
        if (tab) {
          const dot = tab.querySelector('.tab-dot');
          if (dot) dot.classList.add('loaded');
        }
        // if active tab just finished loading, render it
        if (key === activeTabKey) {
          renderItems(cache[f.id]);
          showLoading(false);
        }
      });
    });
  }

  function buildTabs() {
    const bar = document.getElementById('tab-bar');
    if (allowed.length === 0) {
      bar.style.display = 'none';
      document.getElementById('breadcrumb').style.display = 'none';
      document.getElementById('file-list').innerHTML =
        '<div class="no-access"><span style="font-size:36px">🔒</span>' +
        '<strong style="color:#555">Access Restricted</strong>' +
        '<span>Contact your administrator.</span></div>';
      return;
    }

    allowed.forEach(function(key, i) {
      const f = FOLDERS[key];
      if (!f) return;
      const tab = document.createElement('div');
      tab.className = 'folder-tab' + (i === 0 ? ' active' : '');
      tab.dataset.key = key;
      tab.innerHTML = f.name + '<span class="tab-dot"></span>';
      tab.onclick = function() { loadTab(key); };
      bar.appendChild(tab);
    });

    // Set first tab active
    activeTabKey = allowed[0];
    const firstF = FOLDERS[allowed[0]];
    breadcrumbStack = [{ id: firstF.id, name: firstF.name }];
    renderBreadcrumb();

    // Mark dots for folders we already have cached.
    allowed.forEach(function(key) {
      if (cache[FOLDERS[key].id]) {
        const tab = document.querySelector('.folder-tab[data-key="' + key + '"]');
        const dot = tab && tab.querySelector('.tab-dot');
        if (dot) dot.classList.add('loaded');
      }
    });

    const hasAny     = allowed.some(function(k){ return cache[FOLDERS[k].id]; });
    const loginToken = sessionStorage.getItem('erp_login_token') || '';
    const doneToken  = sessionStorage.getItem('drive_refreshed_token') || '';

    // Show last loaded content instantly (no spinner) if we have it.
    if (cache[firstF.id]) renderItems(cache[firstF.id]);
    else document.getElementById('file-list').innerHTML =
      '<div class="state-box"><span class="icon">⏳</span><span class="msg">Loading Drive...</span></div>';

    if (!hasAny) {
      showLoading(true);
      prefetchAll();                              // first ever load
    } else if (loginToken && loginToken !== doneToken) {
      forceRefresh();                             // fresh login — auto refresh once
    }
    // else (same session, cache present): show as-is; pull down to refresh
    if (loginToken) sessionStorage.setItem('drive_refreshed_token', loginToken);
  }

  // ── REFRESH ALL ROOT FOLDERS (force) ──
  function refreshAllRoots() {
    return new Promise(function(resolve) {
      for (const k in cache) delete cache[k];    // drop stale listings (incl. subfolders)
      let remaining = allowed.length;
      if (!remaining) { resolve(); return; }
      allowed.forEach(function(key) {
        const f = FOLDERS[key];
        if (!f) { remaining--; if (!remaining) resolve(); return; }
        fetchFolder(f.id, function() {
          const tab = document.querySelector('.folder-tab[data-key="' + key + '"]');
          const dot = tab && tab.querySelector('.tab-dot');
          if (dot) dot.classList.add('loaded');
          if (key === activeTabKey) {
            breadcrumbStack = [{ id: f.id, name: f.name }];
            renderBreadcrumb();
            renderItems(cache[f.id]);
          }
          remaining--;
          if (!remaining) { saveDriveCache(); resolve(); }
        }, true);
      });
    });
  }

  async function forceRefresh() {
    if (_refreshing) return;
    _refreshing = true;
    const ind = document.getElementById('ptrIndicator');
    ind.style.marginTop = '0px';
    ind.classList.add('ptr-loading');
    document.getElementById('ptrText').textContent = 'Refreshing…';
    await refreshAllRoots();
    ind.classList.remove('ptr-loading');
    document.getElementById('ptrText').textContent = 'Pull to refresh';
    ind.style.marginTop = '-48px';
    _refreshing = false;
  }

  // ── PULL TO REFRESH (bound to the scrolling file list) ──
  (function initPullToRefresh() {
    const list = document.getElementById('file-list');
    const ind  = document.getElementById('ptrIndicator');
    const txt  = document.getElementById('ptrText');
    const MAX = 80, FIRE = 56;
    let startY = 0, pulling = false, dist = 0;
    list.addEventListener('touchstart', function(e) {
      if (_refreshing || list.scrollTop > 0) { pulling = false; return; }
      startY = e.touches[0].clientY; pulling = true;
    }, { passive:true });
    list.addEventListener('touchmove', function(e) {
      if (!pulling || _refreshing) return;
      dist = e.touches[0].clientY - startY;
      if (dist <= 0) { dist = 0; ind.style.marginTop = '-48px'; return; }
      if (list.scrollTop > 0) { pulling = false; return; }
      const eased = Math.min(MAX, dist * 0.5);
      ind.style.marginTop = (eased - 48) + 'px';
      txt.textContent = eased >= FIRE ? 'Release to refresh' : 'Pull to refresh';
    }, { passive:true });
    list.addEventListener('touchend', function() {
      if (!pulling) return;
      pulling = false;
      const eased = Math.min(MAX, dist * 0.5);
      if (eased >= FIRE) forceRefresh();
      else ind.style.marginTop = '-48px';
      dist = 0;
    });
  })();

  buildTabs();
</script>
</body>
</html>
