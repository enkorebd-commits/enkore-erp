<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Profile — Enkore</title>
<style>
:root{
  --blue:#1971c2;--blue2:#4098e6;--bluebg:#e7f1fb;--navy:#0d0d0d;
  --grn:#1b6b3a;--grn2:#2d8a52;--grnbg:#edf7f1;--red:#e03131;--redbg:#fff5f5;
  --amber:#e67e22;--amberbg:#fff4e6;--gold:#b8860b;
  --text:#1a1a2e;--muted:#868e96;--border:#dee2e6;--bg:#f3f4f6;--card:#fff;
  --r:14px;--sh:0 2px 8px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;overscroll-behavior:none}

.hdr{background:linear-gradient(135deg,#123a63,#1971c2);color:#fff;padding:20px 16px 18px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.hdr-name{font-size:21px;font-weight:900;letter-spacing:.2px}
.motiv{font-size:12.5px;font-weight:600;margin-top:10px;line-height:1.5;background:rgba(255,255,255,.12);padding:10px 12px;border-radius:10px}

/* commission bold card */
.commcard{background:linear-gradient(135deg,#123a63,#1971c2);color:#fff;border-radius:var(--r);padding:16px;box-shadow:0 4px 14px rgba(25,113,194,.28);margin-bottom:10px}
.cc-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700;padding:3px 0}
.cc-k{opacity:.85}
.cc-v{font-weight:900}
.cc-final{margin-top:11px;padding-top:12px;border-top:1px solid rgba(255,255,255,.25);text-align:center}
.cc-final-l{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;opacity:.9}
.cc-final-v{font-size:32px;font-weight:900;letter-spacing:-.5px;margin-top:3px}
.cc-final-v .u{font-size:13px;opacity:.85;margin-left:3px}
.cc-final-s{font-size:11px;opacity:.85;margin-top:4px}
.cc-locked{margin-top:11px;font-size:12.5px;font-weight:700;background:rgba(255,255,255,.15);padding:10px 12px;border-radius:10px;line-height:1.5}

.body{padding:14px;max-width:560px;margin:0 auto;padding-bottom:40px}
.sec-t{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:18px 4px 8px}
.sec-t:first-child{margin-top:4px}

.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:14px;margin-bottom:10px}

/* month tri-stat */
.tri{display:flex;gap:8px}
.tri .box{flex:1;text-align:center;background:var(--bg);border-radius:12px;padding:11px 4px}
.box-l{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.box-v{font-size:17px;font-weight:900;margin-top:3px;letter-spacing:-.3px}
.box-v .u{font-size:9px;font-weight:800;color:var(--muted);margin-left:2px}
.box-v.grn{color:var(--grn)}.box-v.red{color:var(--red)}.box-v.blue{color:var(--blue)}

/* big highlight amount */
.big{border-radius:var(--r);padding:16px;color:#fff}
.big.blue{background:linear-gradient(135deg,#1971c2,#4098e6)}
.big.grn{background:linear-gradient(135deg,#1b6b3a,#2d8a52)}
.big.amber{background:linear-gradient(135deg,#d9822b,#e8a04e)}
.big-l{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;opacity:.9}
.big-v{font-size:30px;font-weight:900;letter-spacing:-.5px;line-height:1.05;margin-top:4px}
.big-v .u{font-size:12px;font-weight:800;opacity:.85;margin-left:3px}
.big-sub{font-size:12px;opacity:.9;margin-top:6px}

/* product / commission table */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{text-align:left;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:6px 6px;border-bottom:1.5px solid var(--border)}
.tbl td{padding:8px 6px;border-bottom:1px solid #f1f3f5;vertical-align:top}
.tbl td.num,.tbl th.num{text-align:right;white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl .pname{font-weight:700;line-height:1.35}
.tbl .av{font-weight:900;color:var(--blue)}
.tbl-total{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:2px solid var(--border);font-weight:900}
.tbl-total .v{font-size:16px;color:var(--blue)}

/* gauge */
.gauge-wrap{margin-top:12px}
.gauge-top{display:flex;justify-content:space-between;font-size:11px;font-weight:800;margin-bottom:5px}
.gauge{height:12px;border-radius:8px;background:#e9ecef;overflow:hidden}
.gauge-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#1971c2,#4098e6);transition:width .5s}
.gauge-fill.warn{background:linear-gradient(90deg,#e67e22,#f0a04b)}
.gauge-fill.bad{background:linear-gradient(90deg,#e03131,#f06565)}

/* locked commission */
.locked{background:var(--amberbg);border:1.5px dashed #f0c088;border-radius:var(--r);padding:14px;text-align:center}
.locked-ic{font-size:26px}
.locked-t{font-weight:900;margin-top:4px;color:#b06a12}
.locked-s{font-size:12px;color:#9a6414;margin-top:5px;line-height:1.5}

/* target progress */
.tgt-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.tgt-ach{font-size:22px;font-weight:900}
.tgt-ach.met{color:var(--grn)}.tgt-ach.miss{color:var(--amber)}
.tgt-bar{height:14px;border-radius:8px;background:#e9ecef;overflow:hidden;margin:6px 0}
.tgt-fill{height:100%;background:linear-gradient(90deg,#1b6b3a,#2d8a52)}
.tgt-fill.miss{background:linear-gradient(90deg,#e67e22,#f0a04b)}
.tgt-row{display:flex;justify-content:space-between;font-size:12px;margin-top:6px}
.tgt-row .k{color:var(--muted);font-weight:700}
.tgt-row .val{font-weight:800}
.tgt-note{font-size:12px;font-weight:700;margin-top:12px;background:var(--bluebg);color:#0f4f8a;padding:10px 12px;border-radius:10px;line-height:1.5}

/* product list (all-time) */
.plist{display:flex;flex-direction:column;gap:7px}
.pitem{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:10px;padding:9px 11px}
.pitem .pn{flex:1;min-width:0;font-size:12.5px;font-weight:700;line-height:1.3}
.pitem .pq{flex-shrink:0;font-size:11px;font-weight:800;color:var(--muted)}
.pitem .pv{flex-shrink:0;font-size:13px;font-weight:900;text-align:right;min-width:78px}

/* submit form */
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.inp{width:100%;padding:12px 14px;font-size:16px;border:1.5px solid var(--border);border-radius:10px;outline:none;background:#fff;color:var(--text)}
.inp:focus{border-color:var(--blue)}
.btn{width:100%;padding:13px;font-size:15px;font-weight:800;color:#fff;background:var(--blue);border:none;border-radius:11px;cursor:pointer;transition:.15s}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.cash-row{display:flex;gap:8px;margin-bottom:12px}
.cash-row .box{flex:1}
.hist{margin-top:12px}
.hitem{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f1f3f5}
.hitem:last-child{border-bottom:none}
.hitem .hd{flex:1;min-width:0}
.hitem .ha{font-size:14px;font-weight:900}
.hitem .hdate{font-size:11px;color:var(--muted);margin-top:1px}
.badge{flex-shrink:0;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px}
.badge.Pending{background:var(--amberbg);color:#b06a12}
.badge.Approved{background:var(--grnbg);color:var(--grn)}
.badge.Rejected{background:var(--redbg);color:var(--red)}

/* states */
.state{text-align:center;padding:48px 20px;color:var(--muted)}
.state-icon{font-size:34px;margin-bottom:8px}
.state-txt{font-size:13px;font-weight:600}
.spin{display:inline-block;width:16px;height:16px;border:2.5px solid #d0d4dc;border-top-color:var(--blue);border-radius:50%;animation:rot .6s linear infinite;vertical-align:-3px;margin-right:6px}
@keyframes rot{to{transform:rotate(360deg)}}

#ptrIndicator{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:8px;height:56px;margin-top:-56px;font-size:13px;font-weight:800;color:var(--muted);background:var(--bg);z-index:250;transition:margin-top .18s ease;pointer-events:none}
#ptrIndicator .ptr-spin{width:16px;height:16px;border:2.5px solid #d0d4dc;border-top-color:var(--blue);border-radius:50%;display:inline-block}
#ptrIndicator.ptr-loading .ptr-spin{animation:rot .6s linear infinite}

#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:400;opacity:0;transition:.25s;max-width:90%;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.err{background:#c0392b}
.hide{display:none!important}
</style>
</head>
<body>

<div id="ptrIndicator"><span class="ptr-spin"></span><span id="ptrText">Pull to refresh</span></div>

<div class="hdr">
  <div class="hdr-name" id="hGreet">—</div>
  <div class="motiv" id="motiv">Loading…</div>
</div>

<div class="body" id="body">
  <div class="state"><div class="state-txt"><span class="spin"></span> Loading profile…</div></div>
</div>

<div id="toast"></div>

<script>
const API   = 'https://script.google.com/macros/s/AKfycbylAEyTwyBrejsLKA1a5-dhL57K44UVUJOT9rDvLtd53GSzR-WEEAMYD-WYVx7SpGUaJA/exec';
const PARAMS   = new URLSearchParams(location.search);
const USER_ID  = PARAMS.get('userId') || '';
const READONLY = PARAMS.get('readonly') === '1';
const CACHE_KEY= 'enkore_profileS_' + USER_ID;
let DATA = null, _ptrBusy = false, _submitting = false;

function tk(n){ if(n===''||n==null||isNaN(n)) return '0 <span class="u">tk</span>'; return Number(n).toLocaleString('en-IN',{maximumFractionDigits:2}) + ' <span class="u">tk</span>'; }
function tkPlain(n){ if(n===''||n==null||isNaN(n)) return '0 tk'; return Number(n).toLocaleString('en-IN',{maximumFractionDigits:2}) + ' tk'; }
function pct(n){ return (Math.round((Number(n)||0)*10)/10) + '%'; }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(m,t){ const e=document.getElementById('toast'); e.innerHTML=m; e.className='show'+(t==='err'?' err':''); clearTimeout(window._tt); window._tt=setTimeout(()=>e.className='',2400); }
const MOS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(v){
  if(!v) return '';
  const d=new Date(v); if(isNaN(d)) return String(v);
  return d.getDate()+' '+MOS[d.getMonth()]+', '+d.getFullYear();
}
function greeting(){ const h=new Date().getHours(); if(h<12) return 'Good morning'; if(h<17) return 'Good afternoon'; if(h<21) return 'Good evening'; return 'Good night'; }

function motivLine(d){
  const cl = d.thisMonth.sales>0 ? (d.thisMonth.collected/d.thisMonth.sales*100) : 0;
  if(d.commission.targetMet && cl>=90) return '🔥 Outstanding. Target smashed and collections are clean. Keep this pace.';
  if(d.commission.targetMet) return '✅ Target met. Now push collection higher to lift your commission payout.';
  if(d.target.target>0 && d.target.gap>0) return '🎯 You are '+tkPlain(d.target.gap)+' away from your target. Close the gap to unlock commission.';
  if(cl<60 && d.thisMonth.sales>0) return '💪 Sales are moving. Focus on collecting dues to keep your cash clean.';
  return '📈 A new month, a fresh start. Log sales and keep collections tight.';
}

async function load(){
  try{ const c=sessionStorage.getItem(CACHE_KEY); if(c){ DATA=JSON.parse(c); paint(); } }catch(_){}
  if(!USER_ID){ document.getElementById('body').innerHTML='<div class="state"><div class="state-icon">🔒</div><div class="state-txt">No user id. Open this from the ERP.</div></div>'; return; }
  try{
    const r = await fetch(`${API}?action=getProfile&userId=${encodeURIComponent(USER_ID)}&t=${Date.now()}`).then(x=>x.json());
    if(!r.ok) throw new Error(r.error||'load failed');
    DATA=r; try{ sessionStorage.setItem(CACHE_KEY, JSON.stringify(r)); }catch(_){}
    paint();
  }catch(e){
    console.error(e);
    if(!DATA) document.getElementById('body').innerHTML='<div class="state"><div class="state-icon">⚠️</div><div class="state-txt">Could not load. Pull down to retry.</div></div>';
    else toast('Refresh failed','err');
  }
}

function paint(){
  const d=DATA;
  document.getElementById('hGreet').textContent=greeting()+', '+(d.name||d.id);
  document.getElementById('motiv').innerHTML=motivLine(d);

  const c=d.commission, t=d.target, m=d.thisMonth, a=d.allTime;
  let h='';

  // 1) ALL-TIME SALES
  h+='<div class="sec-t">All-Time Sales</div>';
  h+='<div class="card"><div class="tri">'
    +'<div class="box"><div class="box-l">Total Sales</div><div class="box-v blue">'+tk(a.sales)+'</div></div>'
    +'<div class="box"><div class="box-l">Collected</div><div class="box-v grn">'+tk(a.collected)+'</div></div>'
    +'<div class="box"><div class="box-l">Due</div><div class="box-v red">'+tk(a.due)+'</div></div>'
    +'</div></div>';

  // 2) THIS MONTH SALES
  h+='<div class="sec-t">This Month · '+escapeHtml(d.month||'')+'</div>';
  h+='<div class="card"><div class="tri">'
    +'<div class="box"><div class="box-l">Sales</div><div class="box-v blue">'+tk(m.sales)+'</div></div>'
    +'<div class="box"><div class="box-l">Collected</div><div class="box-v grn">'+tk(m.collected)+'</div></div>'
    +'<div class="box"><div class="box-l">Due</div><div class="box-v red">'+tk(m.due)+'</div></div>'
    +'</div></div>';

  // 3) PRODUCTS, SALES & COMMISSION (single all-time table)
  h+='<div class="sec-t">Products, Sales & Commission</div>';
  h+='<div class="card">';
  if(a.products&&a.products.length){
    let totAv=0;
    h+='<table class="tbl"><thead><tr><th>Product</th><th class="num">Qty</th><th class="num">Total Sales</th><th class="num">%</th><th class="num">Availed</th></tr></thead><tbody>';
    h+=a.products.map(p=>{ totAv+=(p.availed||0); return '<tr><td class="pname">'+escapeHtml(p.name)+'</td><td class="num">'+p.qty+'</td><td class="num">'+tkPlain(p.salesValue)+'</td><td class="num">'+pct((p.commPct||0)*100)+'</td><td class="num av">'+tkPlain(p.availed)+'</td></tr>'; }).join('');
    h+='</tbody></table>';
    h+='<div class="tbl-total"><span>Total Availed (lifetime)</span><span class="v">'+tkPlain(totAv)+'</span></div>';
  } else {
    h+='<div class="tgt-row"><span class="k">No products sold yet.</span><span class="val"></span></div>';
  }
  h+='</div>';

  // 4) MONTHLY TARGET
  h+='<div class="sec-t">Monthly Target</div>';
  h+='<div class="card">';
  if(t.target>0){
    const ach=Math.round(t.achievementPct*10)/10;
    const met=t.actual>=t.target;
    h+='<div class="tgt-top"><span class="box-l">Achievement</span><span class="tgt-ach '+(met?'met':'miss')+'">'+ach+'%</span></div>';
    h+='<div class="tgt-bar"><div class="tgt-fill '+(met?'':'miss')+'" style="width:'+Math.min(ach,100)+'%"></div></div>';
    h+='<div class="tgt-row"><span class="k">Target</span><span class="val">'+tkPlain(t.target)+'</span></div>';
    h+='<div class="tgt-row"><span class="k">Actual</span><span class="val">'+tkPlain(t.actual)+'</span></div>';
    h+='<div class="tgt-row"><span class="k">Gap remaining</span><span class="val" style="color:'+(met?'var(--grn)':'var(--amber)')+'">'+(met?'0 tk — done ✅':tkPlain(t.gap))+'</span></div>';
    if(!met) h+='<div class="tgt-note">💡 Hit this target to unlock commission of about <b>'+tkPlain(t.projectedFinal)+'</b> at your current collection rate.</div>';
  } else {
    h+='<div class="tgt-row"><span class="k">No target set for this month.</span><span class="val"></span></div>';
    h+='<div class="tgt-note">💡 Commission unlocks once a target is set and met.</div>';
  }
  h+='</div>';

  // 5) COMMISSION THIS MONTH — bold separate card
  h+='<div class="sec-t">Commission This Month</div>';
  if(c.targetMet){
    const clp=Math.round(c.collectionPct*1000)/10;
    h+='<div class="commcard">'
      +'<div class="cc-row"><span class="cc-k">Total Availed (this month)</span><span class="cc-v">'+tkPlain(c.totalAvailed)+'</span></div>'
      +'<div class="cc-row"><span class="cc-k">Collection rate</span><span class="cc-v">'+clp+'%</span></div>'
      +'<div class="cc-final"><div class="cc-final-l">Final Commission Earned</div><div class="cc-final-v">'+tk(c.finalCommission)+'</div><div class="cc-final-s">Availed × collection ('+clp+'%)</div></div>'
      +'</div>';
  } else {
    h+='<div class="commcard">'
      +'<div class="cc-row"><span class="cc-k">Total Availed (this month)</span><span class="cc-v">'+tkPlain(c.totalAvailed)+'</span></div>'
      +'<div class="cc-locked">🔒 Locked. Final commission is <b>0 tk</b> until you meet this month\'s target.</div>'
      +'</div>';
  }

  // SUBMIT MONEY
  h+='<div class="sec-t">Cash & Submit Money</div>';
  h+='<div class="card">';
  h+='<div class="cash-row">'
    +'<div class="box"><div class="box-l">Cash Received</div><div class="box-v">'+tk(d.cashReceived)+'</div></div>'
    +'<div class="box"><div class="box-l">Cash in Hand</div><div class="box-v '+((d.cashInHand||0)<0?'red':'grn')+'">'+tk(d.cashInHand)+'</div></div>'
    +'</div>';
  if(!READONLY){
    h+='<div class="field"><label>Amount to submit (tk)</label><input class="inp" id="amt" type="number" inputmode="numeric" min="1" placeholder="e.g. 5000"></div>';
    h+='<div class="field"><label>Comment (optional)</label><input class="inp" id="cmt" type="text" placeholder="e.g. cash handed to office"></div>';
    h+='<button class="btn" id="subBtn" onclick="submitCash()">Submit for approval</button>';
  }
  if(d.submitHistory&&d.submitHistory.length){
    h+='<div class="hist"><div class="box-l" style="margin-bottom:4px">Submission History</div>';
    h+=d.submitHistory.slice().reverse().map(s=>{
      const st=(s.status||'Pending');
      return '<div class="hitem"><div class="hd"><div class="ha">'+tkPlain(s.amount)+'</div><div class="hdate">'+(fmtDate(s.date)||'—')+'</div></div><span class="badge '+escapeHtml(st)+'">'+escapeHtml(st)+'</span></div>';
    }).join('');
    h+='</div>';
  }
  h+='</div>';

  document.getElementById('body').innerHTML=h;
}

async function submitCash(){
  if(_submitting) return;
  const amt=parseFloat((document.getElementById('amt').value||'').replace(/[^0-9.]/g,''));
  const cmt=(document.getElementById('cmt').value||'').trim();
  if(!amt||amt<=0){ toast('Enter a valid amount','err'); return; }
  _submitting=true;
  const btn=document.getElementById('subBtn'); btn.disabled=true; btn.textContent='Submitting…';
  try{
    const qs=new URLSearchParams({action:'submitCash',userId:USER_ID,amount:amt,comment:cmt});
    const r=await fetch(`${API}?${qs}`).then(x=>x.json());
    if(!r.ok) throw new Error(r.error||'failed');
    toast('✅ Submitted '+tkPlain(amt)+' — pending approval');
    try{ sessionStorage.removeItem(CACHE_KEY); }catch(_){}
    await load();
  }catch(e){ console.error(e); toast('Submit failed. Try again.','err'); btn.disabled=false; btn.textContent='Submit for approval'; }
  finally{ _submitting=false; }
}

async function forceRefresh(){
  if(_ptrBusy) return; _ptrBusy=true;
  const ind=document.getElementById('ptrIndicator'); ind.classList.add('ptr-loading');
  document.getElementById('ptrText').textContent='Refreshing…';
  try{ sessionStorage.removeItem(CACHE_KEY); }catch(_){}
  try{ await load(); toast('✅ Refreshed'); }catch(e){ toast('Refresh failed','err'); }
  finally{ _ptrBusy=false; ind.classList.remove('ptr-loading'); document.getElementById('ptrText').textContent='Pull to refresh'; }
}
function initPTR(){
  const ind=document.getElementById('ptrIndicator'), txt=document.getElementById('ptrText');
  const MAX=90, FIRE=60; let startY=0, pulling=false, dist=0;
  document.addEventListener('touchstart',e=>{ if(_ptrBusy||window.scrollY>0){pulling=false;return;} startY=e.touches[0].clientY; pulling=true; },{passive:true});
  document.addEventListener('touchmove',e=>{ if(!pulling||_ptrBusy)return; dist=e.touches[0].clientY-startY; if(dist<=0){dist=0;ind.style.marginTop='-56px';return;} if(window.scrollY>0){pulling=false;return;} const es=Math.min(MAX,dist*0.5); ind.style.marginTop=(es-56)+'px'; txt.textContent=es>=FIRE?'Release to refresh':'Pull to refresh'; },{passive:true});
  document.addEventListener('touchend',()=>{ if(!pulling)return; pulling=false; const es=Math.min(MAX,dist*0.5); if(es>=FIRE){ind.style.marginTop='0px';forceRefresh().then(()=>{ind.style.marginTop='-56px';});} else ind.style.marginTop='-56px'; dist=0; });
}
window.addEventListener('DOMContentLoaded',()=>{ load(); initPTR(); });
</script>
</body>
